      bgColor: '#111118',
      
      tiles: this.generateCaveMap(35, 30),
      collision: this.generateCaveCollision(35, 30),
      
      transitions: [
        { x: 15, y: 29, w: 3, h: 1, target: 'village', spawnX: 20, spawnY: 2 }
      ],
      
      enemies: [
        { type: 'skeleton', x: 10, y: 10, respawn: true },
        { type: 'skeleton', x: 15, y: 15, respawn: true },
        { type: 'skeleton', x: 20, y: 10, respawn: true },
        { type: 'skeleton', x: 25, y: 20, respawn: true },
        { type: 'skeleton', x: 12, y: 22, respawn: true },
        { type: 'dark_knight', x: 17, y: 5, respawn: false }
      ],
      
      npcs: [],
      playerSpawn: { x: 15, y: 28 }
    };
    
    // Boss Arena
    this.maps.boss_arena = {
      width: 25,
      height: 20,
      name: 'Dragon\'s Lair',
      sub: 'The final battle',
      bgColor: '#1a0a0a',
      
      tiles: this.generateArenaMap(25, 20),
      collision: this.generateArenaCollision(25, 20),
      
      transitions: [
        { x: 0, y: 9, w: 1, h: 3, target: 'forest', spawnX: 47, spawnY: 17 }
      ],
      
      enemies: [
        { type: 'dragon', x: 12, y: 8, respawn: false, boss: true, 
          bossName: 'Ancient Dragon Vexar' }
      ],
      
      npcs: [],
      playerSpawn: { x: 3, y: 15 }
    };
  },
  
  generateVillageMap(w, h) {
    const tiles = [];
    for (let y = 0; y < h; y++) {
      tiles[y] = [];
      for (let x = 0; x < w; x++) {
        // Default grass
        let tile = 0;
        
        // Paths
        if ((x >= 8 && x <= 22 && y >= 13 && y <= 16) ||
            (x >= 14 && x <= 16 && y >= 5 && y <= 20)) {
          tile = 3;
        }
        
        // Buildings (represented as walls)
        if (x >= 6 && x <= 12 && y >= 7 && y <= 11) tile = 4; // Elder house
        if (x >= 14 && x <= 18 && y >= 9 && y <= 13) tile = 4; // Shop
        
        // Water
        if (x >= 30 && x <= 35 && y >= 5 && y <= 12) tile = 2;
        
        // Trees scattered
        if (tile === 0 && Math.random() < 0.05 && y > 2 && y < h-2 && x > 2 && x < w-2) {
          tile = 5;
        }
        
        // Flowers
        if (tile === 0 && Math.random() < 0.03) tile = 6;
        
        tiles[y][x] = tile;
      }
    }
    return tiles;
  },
  
  generateVillageCollision(w, h) {
    const col = [];
    for (let y = 0; y < h; y++) {
      col[y] = [];
      for (let x = 0; x < w; x++) {
        // Walls around map edges
        if (x === 0 || x === w-1 || y === 0 || y === h-1) {
          // Keep transitions open
          if (x === w-1 && y >= 14 && y <= 16) col[y][x] = 0;
          else if (y === 0 && x >= 19 && x <= 21) col[y][x] = 0;
          else col[y][x] = 1;
        }
        // Water
        else if (x >= 30 && x <= 35 && y >= 5 && y <= 12) col[y][x] = 1;
        // Building walls (but not doors)
        else if (x >= 6 && x <= 12 && y >= 7 && y <= 11) {
          if ((x === 9 && y === 11) || (x === 10 && y === 11)) col[y][x] = 0;
          else if (y === 7 || y === 11 || x === 6 || x === 12) col[y][x] = 1;
          else col[y][x] = 0;
        }
        else if (x >= 14 && x <= 18 && y >= 9 && y <= 13) {
          if ((x === 16 && y === 13)) col[y][x] = 0;
          else if (y === 9 || y === 13 || x === 14 || x === 18) col[y][x] = 1;
          else col[y][x] = 0;
        }
        else {
          col[y][x] = 0;
        }
      }
    }
    return col;
  },
  
  generateForestMap(w, h) {
    const tiles = [];
    for (let y = 0; y < h; y++) {
      tiles[y] = [];
      for (let x = 0; x < w; x++) {
        let tile = 0;
        
        // Dense trees
        if (Math.random() < 0.15 && y > 1 && y < h-1 && x > 1 && x < w-1) {
          tile = 5;
        }
        
        // Path through forest
        if (y >= 14 && y <= 18 && tile === 5) tile = 0;
        if (y >= 14 && y <= 18 && Math.random() < 0.3) tile = 3;
        
        tiles[y][x] = tile;
      }
    }
    return tiles;
  },
  
  generateForestCollision(w, h) {
    const col = [];
    const tiles = this.maps.forest ? this.maps.forest.tiles : this.generateForestMap(w, h);
    for (let y = 0; y < h; y++) {
      col[y] = [];
      for (let x = 0; x < w; x++) {
        if (x === 0 || x === w-1 || y === 0 || y === h-1) {
          if (x === 0 && y >= 14 && y <= 16) col[y][x] = 0;
          else if (x === w-1 && y >= 16 && y <= 18) col[y][x] = 0;
          else col[y][x] = 1;
        } else if (tiles[y] && tiles[y][x] === 5) {
          col[y][x] = 1;
        } else {
          col[y][x] = 0;
        }
      }
    }
    return col;
  },
  
  generateCaveMap(w, h) {
    const tiles = [];
    for (let y = 0; y < h; y++) {
      tiles[y] = [];
      for (let x = 0; x < w; x++) {
        // Cave floor
        let tile = 4;
        
        // Cave walls (random cavern shape)
        const distFromCenter = Math.sqrt(Math.pow(x - w/2, 2) + Math.pow(y - h/2, 2));
        if (distFromCenter > 12 + Math.sin(x * 0.5) * 3 + Math.cos(y * 0.7) * 2) {
          tile = 1;
        }
        
        // Ensure path from bottom entrance
        if (x >= 14 && x <= 18 && y >= 25) tile = 4;
        
        tiles[y][x] = tile;
      }
    }
    return tiles;
  },
  
  generateCaveCollision(w, h) {
    const col = [];
    for (let y = 0; y < h; y++) {
      col[y] = [];
      for (let x = 0; x < w; x++) {
        if (x === 0 || x === w-1 || y === 0) {
          col[y][x] = 1;
        } else if (y === h-1) {
          if (x >= 15 && x <= 17) col[y][x] = 0;
          else col[y][x] = 1;
        } else {
          const distFromCenter = Math.sqrt(Math.pow(x - w/2, 2) + Math.pow(y - h/2, 2));
          col[y][x] = distFromCenter > 12 + Math.sin(x * 0.5) * 3 + Math.cos(y * 0.7) * 2 ? 1 : 0;
          if (x >= 14 && x <= 18 && y >= 25) col[y][x] = 0;
        }
      }
    }
    return col;
  },
  
  generateArenaMap(w, h) {
    const tiles = [];
    for (let y = 0; y < h; y++) {
      tiles[y] = [];
      for (let x = 0; x < w; x++) {
        let tile = 4;
        const dist = Math.sqrt(Math.pow(x - w/2, 2) + Math.pow(y - h/2, 2));
        if (dist > 9) tile = 1;
        tiles[y][x] = tile;
      }
    }
    return tiles;
  },
  
  generateArenaCollision(w, h) {
    const col = [];
    for (let y = 0; y < h; y++) {
      col[y] = [];
      for (let x = 0; x < w; x++) {
        if (x === 0 && y >= 9 && y <= 11) { col[y][x] = 0; continue; }
        const dist = Math.sqrt(Math.pow(x - w/2, 2) + Math.pow(y - h/2, 2));
        col[y][x] = dist > 9 ? 1 : 0;
      }
    }
    return col;
  },
  
  loadMap(name) {
    if (!this.maps[name]) {
      this.createMaps();
    }
    
    this.currentMap = this.maps[name];
    this.currentMapName = name;
    
    const spawn = this.currentMap.playerSpawn;
    Player.x = spawn.x * Game.TILE;
    Player.y = spawn.y * Game.TILE;
    
    EnemyManager.loadMapEnemies(this.currentMap.enemies);
    NPCManager.loadMapNPCs(this.currentMap.npcs);
    
    Game.showZoneName(this.currentMap.name, this.currentMap.sub);
  },
  
  checkTransitions() {
    if (!this.currentMap) return;
    
    const px = Math.floor(Player.x / Game.TILE);
    const py = Math.floor(Player.y / Game.TILE);
    
    this.currentMap.transitions.forEach(t => {
      if (px >= t.x && px < t.x + t.w && py >= t.y && py < t.y + t.h) {
        Player.x = t.spawnX * Game.TILE;
        Player.y = t.spawnY * Game.TILE;
        this.loadMap(t.target);
      }
    });
  },
  
  isWalkable(x, y) {
    if (!this.currentMap) return false;
    const tx = Math.floor(x / Game.TILE);
    const ty = Math.floor(y / Game.TILE);
    if (tx < 0 || tx >= this.currentMap.width || ty < 0 || ty >= this.currentMap.height) return false;
    return this.currentMap.collision[ty][tx] === 0;
  },
  
  renderBackground(ctx) {
    if (!this.currentMap) return;
    
    const map = this.currentMap;
    ctx.fillStyle = map.bgColor;
    ctx.fillRect(0, 0, map.width * Game.TILE, map.height * Game.TILE);
  },
  
  renderGround(ctx) {
    if (!this.currentMap) return;
    
    const map = this.currentMap;
    const T = Game.TILE;
    
    // Only render visible tiles
    const startX = Math.max(0, Math.floor((Game.camera.x - Game.width/2) / T) - 1);
    const endX = Math.min(map.width, Math.ceil((Game.camera.x + Game.width/2) / T) + 1);
    const startY = Math.max(0, Math.floor((Game.camera.y - Game.height/2) / T) - 1);
    const endY = Math.min(map.height, Math.ceil((Game.camera.y + Game.height/2) / T) + 1);
    
    for (let y = startY; y < endY; y++) {
      for (let x = startX; x < endX; x++) {
        const tile = map.tiles[y][x];
        const px = x * T;
        const py = y * T;
        
        switch(tile) {
          case 0: // Grass
            ctx.fillStyle = '#3a5a2a';
            ctx.fillRect(px, py, T, T);
            // Grass detail
            ctx.fillStyle = '#4a6a3a';
            if ((x + y) % 3 === 0) {
              ctx.fillRect(px + 4, py + 4, 2, 2);
              ctx.fillRect(px + 20, py + 16, 2, 2);
            }
            if ((x + y) % 5 === 0) {
              ctx.fillStyle = '#2a4a1a';
              ctx.fillRect(px + 12, py + 8, 2, 2);
            }
            break;
            
          case 1: // Wall/Rock
            ctx.fillStyle = '#555';
            ctx.fillRect(px, py, T, T);
            ctx.fillStyle = '#666';
            ctx.fillRect(px + 2, py + 2, T - 4, T - 4);
            ctx.fillStyle = '#777';
            ctx.fillRect(px + 4, py + 4, 4, 4);
            ctx.fillStyle = '#444';
            ctx.fillRect(px + T - 8, py + T - 8, 4, 4);
            // Cracks
            ctx.strokeStyle = '#444';
            ctx.lineWidth = 1;
            if ((x * 7 + y * 13) % 5 === 0) {
              ctx.beginPath();
              ctx.moveTo(px + 8, py + 4);
              ctx.lineTo(px + 16, py + 14);
              ctx.lineTo(px + 20, py + 12);
              ctx.stroke();
            }
            break;
            
          case 2: // Water
            ctx.fillStyle = '#2255aa';
            ctx.fillRect(px, py, T, T);
            ctx.fillStyle = '#3366bb';
            const waveOff = Math.sin(Date.now() * 0.003 + x + y) * 3;
            ctx.fillRect(px + 4 + waveOff, py + 8, 12, 2);
            ctx.fillRect(px + 8, py + 18 + waveOff, 10, 2);
            ctx.fillStyle = '#4477cc';
            ctx.fillRect(px + 14 + waveOff * 0.5, py + 4, 6, 2);
            break;
            
          case 3: // Path
            ctx.fillStyle = '#8B7355';
            ctx.fillRect(px, py, T, T);
            ctx.fillStyle = '#9B8365';
            ctx.fillRect(px + 4, py + 4, T - 8, T - 8);
            // Pebbles
            ctx.fillStyle = '#7a6345';
            if ((x + y) % 2 === 0) {
              ctx.fillRect(px + 6, py + 6, 3, 3);
              ctx.fillRect(px + 18, py + 20, 2, 2);
            }
            break;
            
          case 4: // Floor
            ctx.fillStyle = '#776655';
            ctx.fillRect(px, py, T, T);
            ctx.strokeStyle = '#665544';
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 1, py + 1, T - 2, T - 2);
            // Floor pattern
            if ((x + y) % 2 === 0) {
              ctx.fillStyle = '#887766';
              ctx.fillRect(px + 2, py + 2, T - 4, T - 4);
            }
            break;
            
          case 5: // Tree
            // Ground under tree
            ctx.fillStyle = '#3a5a2a';
            ctx.fillRect(px, py, T, T);
            // Trunk
            ctx.fillStyle = '#654321';
            ctx.fillRect(px + 12, py + 16, 8, 16);
            ctx.fillStyle = '#7a5432';
            ctx.fillRect(px + 14, py + 18, 4, 12);
            // Leaves
            ctx.fillStyle = '#2d6b2d';
            ctx.beginPath();
            ctx.arc(px + 16, py + 10, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#3a8a3a';
            ctx.beginPath();
            ctx.arc(px + 14, py + 8, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#4a9a4a';
            ctx.beginPath();
            ctx.arc(px + 18, py + 6, 6, 0, Math.PI * 2);
            ctx.fill();
            break;
            
          case 6: // Flower
            ctx.fillStyle = '#3a5a2a';
            ctx.fillRect(px, py, T, T);
            // Flowers
            const flowerColors = ['#ff6688', '#ffaa44', '#ff44aa', '#44aaff', '#ffff44'];
            const fc = flowerColors[(x * 3 + y * 7) % flowerColors.length];
            ctx.fillStyle = '#4a7a3a';
            ctx.fillRect(px + 14, py + 16, 2, 8);
            ctx.fillStyle = fc;
            ctx.beginPath();
            ctx.arc(px + 15, py + 14, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff0';
            ctx.beginPath();
            ctx.arc(px + 15, py + 14, 2, 0, Math.PI * 2);
            ctx.fill();
            break;
        }
      }
    }
    
    // Draw building roofs
    if (this.currentMapName === 'village') {
      // Elder's house roof
      ctx.fillStyle = '#884422';
      ctx.fillRect(5 * T, 6 * T, 8 * T, T);
      ctx.fillStyle = '#773311';
      for (let i = 0; i < 8; i++) {
        ctx.fillRect((5 + i) * T, 6 * T, T, T - 4);
      }
      
      // Shop roof
      ctx.fillStyle = '#226688';
      ctx.fillRect(13 * T, 8 * T, 6 * T, T);
      ctx.fillStyle = '#115577';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect((13 + i) * T, 8 * T, T, T - 4);
      }
    }
  },
  
  renderForeground(ctx) {
    // Tree tops that should render above entities
    if (!this.currentMap) return;
    
    const map = this.currentMap;
    const T = Game.TILE;
    
    const startX = Math.max(0, Math.floor((Game.camera.x - Game.width/2) / T) - 1);
    const endX = Math.min(map.width, Math.ceil((Game.camera.x + Game.width/2) / T) + 1);
    const startY = Math.max(0, Math.floor((Game.camera.y - Game.height/2) / T) - 1);
    const endY = Math.min(map.height, Math.ceil((Game.camera.y + Game.height/2) / T) + 1);
    
    for (let y = startY; y < endY; y++) {
      for (let x = startX; x < endX; x++) {
        if (map.tiles[y][x] === 5) {
          const px = x * T;
          const py = y * T;
          
          // Upper leaves (foreground)
          ctx.fillStyle = 'rgba(45, 107, 45, 0.3)';
          ctx.beginPath();
          ctx.arc(px + 16, py + 6, 14, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
};

// ==========================================
// PLAYER
// ==========================================
const Player = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  width: 20, height: 12,
  
  // Stats
  level: 1,
  hp: 100, maxHp: 100,
  mp: 50, maxMp: 50,
  exp: 0, expToLevel: 30,
  atk: 12, def: 5, spd: 120,
  critRate: 10,
  gold: 0,
  killCount: 0,
  
  // Animation
  direction: 'down',
  action: 'idle',
  frame: 0,
  frameTimer: 0,
  frameSpeed: 0.12,
  sprites: null,
  
  // Combat
  attacking: false,
  attackTimer: 0,
  attackDuration: 0.4,
  attackCooldown: 0,
  attackRange: 40,
  
  // Skills
  skill1Cooldown: 0,
  skill2Cooldown: 0,
  
  // Dodge
  dodging: false,
  dodgeTimer: 0,
  dodgeDuration: 0.3,
  dodgeCooldown: 0,
  dodgeSpeed: 300,
  
  // Jump
  jumping: false,
  jumpHeight: 0,
  jumpVelocity: 0,
  
  // Invincibility
  invincible: false,
  invincibleTimer: 0,
  
  // Inventory
  inventory: [],
  
  init() {
    this.sprites = SpriteLib.generatePlayerSprites();
    this.hp = this.maxHp;
    this.mp = this.maxMp;
    this.exp = 0;
    this.level = 1;
    this.gold = 0;
    this.killCount = 0;
    this.inventory = [
      { id: 'hp_potion', icon: '❤️', name: 'HP Potion', type: 'potion', count: 3 },
      { id: 'mp_potion', icon: '💙', name: 'MP Potion', type: 'potion', count: 2 }
    ];
  },
  
  update(dt) {
    // Timers
    if (this.attackCooldown > 0) this.attackCooldown -= dt;
    if (this.skill1Cooldown > 0) this.skill1Cooldown -= dt;
    if (this.skill2Cooldown > 0) this.skill2Cooldown -= dt;
    if (this.dodgeCooldown > 0) this.dodgeCooldown -= dt;
    
    if (this.invincible) {
      this.invincibleTimer -= dt;
      if (this.invincibleTimer <= 0) this.invincible = false;
    }
    
    // MP regen
    this.mp = Math.min(this.maxMp, this.mp + 2 * dt);
    
    // Movement
    if (!this.attacking && !this.dodging) {
      const move = InputManager.getMovement();
      const speed = this.spd;
      
      this.vx = move.x * speed;
      this.vy = move.y * speed;
      
      // Direction
      if (Math.abs(move.x) > 0.3 || Math.abs(move.y) > 0.3) {
        if (Math.abs(move.x) > Math.abs(move.y)) {
          this.direction = move.x > 0 ? 'right' : 'left';
        } else {
          this.direction = move.y > 0 ? 'down' : 'up';
        }
        this.action = 'walk';
      } else {
        this.vx = 0;
        this.vy = 0;
        this.action = 'idle';
      }
    }
    
    // Dodge movement
    if (this.dodging) {
      this.dodgeTimer -= dt;
      if (this.dodgeTimer <= 0) {
        this.dodging = false;
        this.invincible = false;
      }
    }
    
    // Attack timer
    if (this.attacking) {
      this.attackTimer -= dt;
      if (this.attackTimer <= 0) {
        this.attacking = false;
        this.action = 'idle';
      }
    }
    
    // Jump
    if (this.jumping) {
      this.jumpVelocity += 500 * dt; // gravity
      this.jumpHeight -= this.jumpVelocity * dt;
      if (this.jumpHeight >= 0) {
        this.jumpHeight = 0;
        this.jumping = false;
        this.jumpVelocity = 0;
      }
    }
    
    // Apply movement with collision
    const newX = this.x + this.vx * dt;
    const newY = this.y + this.vy * dt;
    
    if (MapManager.isWalkable(newX, this.y)) this.x = newX;
    if (MapManager.isWalkable(this.x, newY)) this.y = newY;
    
    // Animation
    this.frameTimer += dt;
    if (this.frameTimer >= this.frameSpeed) {
      this.frameTimer = 0;
      const key = `${this.action}_${this.direction}`;
      if (this.sprites[key]) {
        this.frame = (this.frame + 1) % this.sprites[key].length;
      }
    }
    
    // NPC interaction check
    NPCManager.checkInteraction();
  },
  
  render(ctx) {
    const key = `${this.action}_${this.direction}`;
    const sprites = this.sprites[key];
    
    if (!sprites || sprites.length === 0) return;
    
    const frame = this.frame % sprites.length;
    const sprite = sprites[frame];
    
    ctx.save();
    
    // Invincibility flash
    if (this.invincible && Math.floor(Date.now() / 80) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
    
    // Dodge trail effect
    if (this.dodging) {
      ctx.globalAlpha = 0.3;
      ctx.drawImage(sprite, this.x - 24 - this.vx * 0.03, this.y - 42 + this.jumpHeight - this.vy * 0.03, 48, 48);
      ctx.globalAlpha = 0.15;
      ctx.drawImage(sprite, this.x - 24 - this.vx * 0.06, this.y - 42 + this.jumpHeight - this.vy * 0.06, 48, 48);
      ctx.globalAlpha = this.invincible ? 0.5 : 1;
    }
    
    ctx.drawImage(sprite, this.x - 24, this.y - 42 + this.jumpHeight, 48, 48);
    
    // HP bar above head
    ctx.restore();
    
    if (this.hp < this.maxHp) {
      const barW = 30;
      const barH = 3;
      const barX = this.x - barW / 2;
      const barY = this.y - 48 + this.jumpHeight;
      
      ctx.fillStyle = '#333';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(barX, barY, barW * (this.hp / this.maxHp), barH);
    }
  },
  
  attack() {
    if (this.attacking || this.attackCooldown > 0 || this.dodging) return;
    
    this.attacking = true;
    this.attackTimer = this.attackDuration;
    this.attackCooldown = 0.15;
    this.action = 'attack';
    this.frame = 0;
    
    // Slow down during attack
    this.vx *= 0.3;
    this.vy *= 0.3;
    
    // Hit enemies in range
    const attackDir = this.getAttackOffset();
    const ax = this.x + attackDir.x;
    const ay = this.y + attackDir.y;
    
    EnemyManager.enemies.forEach(enemy => {
      if (!enemy.alive) return;
      const dist = Math.sqrt(Math.pow(enemy.x - ax, 2) + Math.pow(enemy.y - ay, 2));
      if (dist < this.attackRange) {
        let dmg = this.atk + Math.floor(Math.random() * 5);
        let isCrit = Math.random() * 100 < this.critRate;
        if (isCrit) dmg = Math.floor(dmg * 1.5);
        
        enemy.takeDamage(dmg, isCrit);
      }
    });
    
    // Attack particle
    ParticleSystem.emit(ax, ay, 5, '#fff', 0.3);
    Game.shake(2, 0.1);
  },
  
  useSkill(num) {
    if (this.attacking || this.dodging) return;
    
    if (num === 1) {
      // Skill 1: Blade Dash - dash forward and damage enemies
      if (this.skill1Cooldown > 0 || this.mp < 15) return;
      
      this.mp -= 15;
      this.skill1Cooldown = 3;
      
      const dir = this.getAttackOffset();
      const dashDist = 80;
      const targetX = this.x + dir.x * 3;
      const targetY = this.y + dir.y * 3;
      
      // Damage enemies along dash path
      EnemyManager.enemies.forEach(enemy => {
        if (!enemy.alive) return;
        const dist = Math.sqrt(Math.pow(enemy.x - this.x, 2) + Math.pow(enemy.y - this.y, 2));
        if (dist < dashDist) {
          const dmg = Math.floor(this.atk * 1.5) + Math.floor(Math.random() * 8);
          enemy.takeDamage(dmg, false);
        }
      });
      
      if (MapManager.isWalkable(targetX, targetY)) {
        this.x = targetX;
        this.y = targetY;
      }
      
      ParticleSystem.emit(this.x, this.y, 15, '#3498db', 0.5);
      Game.shake(4, 0.15);
      Game.flash('rgba(52,152,219,0.3)', 150);
      
    } else if (num === 2) {
      // Skill 2: Magic Burst - AoE damage around player
      if (this.skill2Cooldown > 0 || this.mp < 25) return;
      
      this.mp -= 25;
      this.skill2Cooldown = 5;
      
      EnemyManager.enemies.forEach(enemy => {
        if (!enemy.alive) return;
        const dist = Math.sqrt(Math.pow(enemy.x - this.x, 2) + Math.pow(enemy.y - this.y, 2));
        if (dist < 70) {
          const dmg = Math.floor(this.atk * 2) + Math.floor(Math.random() * 10);
          enemy.takeDamage(dmg, false);
        }
      });
      
      ParticleSystem.emit(this.x, this.y, 30, '#9b59b6', 0.8);
      ParticleSystem.emit(this.x, this.y, 20, '#e74c3c', 0.6);
      Game.shake(6, 0.2);
      Game.flash('rgba(155,89,182,0.4)', 200);
      
      // Magic circle effect
      ProjectileManager.add({
        x: this.x, y: this.y,
        vx: 0, vy: 0,
        radius: 5,
        maxRadius: 70,
        color: '#9b59b6',
        duration: 0.4,
        timer: 0,
        type: 'aoe_ring',
        damage: 0
      });
    }
  },
  
  dodge() {
    if (this.dodging || this.dodgeCooldown > 0) return;
    
    this.dodging = true;
    this.dodgeTimer = this.dodgeDuration;
    this.dodgeCooldown = 0.8;
    this.invincible = true;
    this.invincibleTimer = this.dodgeDuration;
    this.action = 'dodge';
    this.frame = 0;
    
    const dir = this.getAttackOffset();
    this.vx = dir.x * this.dodgeSpeed;
    this.vy = dir.y * this.dodgeSpeed;
    
    ParticleSystem.emit(this.x, this.y, 8, 'rgba(255,255,255,0.5)', 0.3);
  },
  
  jump() {
    if (this.jumping) return;
    this.jumping = true;
    this.jumpVelocity = -200;
    this.jumpHeight = 0;
  },
  
  getAttackOffset() {
    switch(this.direction) {
      case 'up': return { x: 0, y: -20 };
      case 'down': return { x: 0, y: 20 };
      case 'left': return { x: -20, y: 0 };
      case 'right': return { x: 20, y: 0 };
    }
  },
  
  takeDamage(amount) {
    if (this.invincible || this.dodging) return;
    
    const actualDmg = Math.max(1, amount - this.def);
    this.hp -= actualDmg;
    
    Game.showDamage(this.x, this.y - 40, actualDmg, '#ff4444');
    Game.shake(3, 0.15);
    Game.flash('rgba(255,0,0,0.2)', 100);
    
    this.invincible = true;
    this.invincibleTimer = 0.5;
    
    if (this.hp <= 0) {
      this.hp = 0;
      this.die();
    }
  },
  
  die() {
    Game.notify('You have fallen...');
    // Respawn after delay
    setTimeout(() => {
      this.hp = this.maxHp;
      this.mp = this.maxMp;
      MapManager.loadMap('village');
      Game.notify('Revived at village');
    }, 2000);
  },
  
  gainExp(amount) {
    this.exp += amount;
    
    while (this.exp >= this.expToLevel) {
      this.exp -= this.expToLevel;
      this.levelUp();
    }
  },
  
  levelUp() {
    this.level++;
    this.maxHp += 15;
    this.maxMp += 8;
    this.atk += 3;
    this.def += 2;
    this.spd += 5;
    this.hp = this.maxHp;
    this.mp = this.maxMp;
    this.expToLevel = Math.floor(this.expToLevel * 1.4);
    
    Game.notify('⬆️ Level Up! Lv.' + this.level);
    Game.flash('rgba(241,196,15,0.4)', 300);
    ParticleSystem.emit(this.x, this.y, 25, '#f1c40f', 1);
  },
  
  addGold(amount) {
    this.gold += amount;
  },
  
  addItem(item) {
    const existing = this.inventory.find(i => i.id === item.id);
    if (existing) {
      existing.count += (item.count || 1);
    } else {
      this.inventory.push({ ...item, count: item.count || 1 });
    }
    Game.notify('Got: ' + item.name);
  },
  
  getSaveData() {
    return {
      x: this.x, y: this.y,
      level: this.level,
      hp: this.hp, maxHp: this.maxHp,
      mp: this.mp, maxMp: this.maxMp,
      exp: this.exp, expToLevel: this.expToLevel,
      atk: this.atk, def: this.def, spd: this.spd,
      critRate: this.critRate,
      gold: this.gold,
      killCount: this.killCount,
      inventory: this.inventory,
      direction: this.direction
    };
  },
  
  loadData(data) {
    Object.assign(this, data);
  }
};

// ==========================================
// ENEMY MANAGER
// ==========================================
const EnemyManager = {
  enemies: [],
  spriteCache: {},
  
  init() {
    this.enemies = [];
  },
  
  loadMapEnemies(enemyDefs) {
    this.enemies = [];
    if (!enemyDefs) return;
    
    enemyDefs.forEach(def => {
      this.spawnEnemy(def);
    });
  },
  
  spawnEnemy(def) {
    if (!this.spriteCache[def.type]) {
      this.spriteCache[def.type] = SpriteLib.generateEnemySprites(def.type);
    }
    
    const stats = this.getEnemyStats(def.type);
    
    const enemy = {
      type: def.type,
      x: def.x * Game.TILE,
      y: def.y * Game.TILE,
      spawnX: def.x * Game.TILE,
      spawnY: def.y * Game.TILE,
      width: stats.width || 20,
      height: stats.height || 12,
      
      hp: stats.hp,
      maxHp: stats.hp,
      atk: stats.atk,
      def: stats.def,
      exp: stats.exp,
      gold: stats.gold,
      
      alive: true,
      sprites: this.spriteCache[def.type],
      direction: 'down',
      action: 'idle',
      frame: 0,
      frameTimer: 0,
      
      // AI
      aiState: 'idle',
      aiTimer: 0,
      aggroRange: stats.aggroRange || 100,
      attackRange: stats.attackRange || 30,
      attackCooldown: 0,
      speed: stats.speed || 50,
      
      // Patrol
      patrolTarget: null,
      
      respawn: def.respawn || false,
      respawnTimer: 0,
      
      boss: def.boss || false,
      bossName: def.bossName || '',
      
      hurtTimer: 0,
      
      update(dt) {
        if (!this.alive) {
          if (this.respawn) {
            this.respawnTimer -= dt;
            if (this.respawnTimer <= 0) {
              this.alive = true;
              this.hp = this.maxHp;
              this.x = this.spawnX;
              this.y = this.spawnY;
              this.aiState = 'idle';
            }
          }
          return;
        }
        
        if (this.hurtTimer > 0) this.hurtTimer -= dt;
        if (this.attackCooldown > 0) this.attackCooldown -= dt;
        
        // AI
        const distToPlayer = Math.sqrt(
          Math.pow(Player.x - this.x, 2) + Math.pow(Player.y - this.y, 2)
        );
        
        switch(this.aiState) {
          case 'idle':
            this.action = 'idle';
            this.aiTimer -= dt;
            
            if (distToPlayer < this.aggroRange) {
              this.aiState = 'chase';
            } else if (this.aiTimer <= 0) {
              this.aiState = 'patrol';
              this.patrolTarget = {
                x: this.spawnX + (Math.random() - 0.5) * 100,
                y: this.spawnY + (Math.random() - 0.5) * 100
              };
              this.aiTimer = 2 + Math.random() * 3;
            }
            break;
            
          case 'patrol':
            if (this.patrolTarget) {
              const dx = this.patrolTarget.x - this.x;
              const dy = this.patrolTarget.y - this.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              
              if (dist > 5) {
                const nx = dx / dist;
                const ny = dy / dist;
                const newX = this.x + nx * this.speed * 0.5 * dt;
                const newY = this.y + ny * this.speed * 0.5 * dt;
                if (MapManager.isWalkable(newX, newY)) {
                  this.x = newX;
                  this.y = newY;
                }
                this.updateDirection(nx, ny);
                this.action = 'walk';
              } else {
                this.aiState = 'idle';
                this.aiTimer = 1 + Math.random() * 2;
              }
            }
            
            if (distToPlayer < this.aggroRange) {
              this.aiState = 'chase';
            }
            break;
            
          case 'chase':
            if (distToPlayer > this.aggroRange * 2) {
              this.aiState = 'idle';
              this.aiTimer = 1;
              break;
            }
            
            if (distToPlayer <= this.attackRange) {
              this.aiState = 'attack';
              break;
            }
            
            const cdx = Player.x - this.x;
            const cdy = Player.y - this.y;
            const cdist = Math.sqrt(cdx * cdx + cdy * cdy);
            const cnx = cdx / cdist;
            const cny = cdy / cdist;
            
            const newCX = this.x + cnx * this.speed * dt;
            const newCY = this.y + cny * this.speed * dt;
            if (MapManager.isWalkable(newCX, newCY)) {
              this.x = newCX;
              this.y = newCY;
            }
            
            this.updateDirection(cnx, cny);
            this.action = 'walk';
            break;
            
          case 'attack':
            this.action = 'attack';
            
            if (this.attackCooldown <= 0) {
              if (distToPlayer <= this.attackRange + 10) {
                Player.takeDamage(this.atk);
                this.attackCooldown = this.boss ? 1.5 : 1;
                
                if (this.boss) {
                  Game.shake(5, 0.2);
                  ParticleSystem.emit(Player.x, Player.y, 10, '#f44', 0.3);
                }
              }
            }
            
            if (distToPlayer > this.attackRange + 20) {
              this.aiState = 'chase';
            }
            break;
        }
        
        // Boss HP bar
        if (this.boss && distToPlayer < this.aggroRange * 1.5) {
          const bossUI = document.getElementById('bossHP');
          bossUI.style.display = 'block';
          document.getElementById('bossName').textContent = this.bossName;
          document.getElementById('bossHPFill').style.width = (this.hp / this.maxHp * 100) + '%';
        }
        
        // Animation
        this.frameTimer += dt;
        if (this.frameTimer >= 0.15) {
          this.frameTimer = 0;
          const key = `${this.action}_${this.direction}`;
          if (this.sprites[key]) {
            this.frame = (this.frame + 1) % this.sprites[key].length;
          }
        }
      },
      
      updateDirection(nx, ny) {
        if (Math.abs(nx) > Math.abs(ny)) {
          this.direction = nx > 0 ? 'right' : 'left';
        } else {
          this.direction = ny > 0 ? 'down' : 'up';
        }
      },
      
      render(ctx) {
        if (!this.alive) return;
        
        const key = `${this.action}_${this.direction}`;
        const sprites = this.sprites[key];
        if (!sprites || sprites.length === 0) return;
        
        const frame = this.frame % sprites.length;
        const sprite = sprites[frame];
        
        ctx.save();
        
        // Hurt flash
        if (this.hurtTimer > 0 && Math.floor(this.hurtTimer * 10) % 2 === 0) {
          ctx.globalAlpha = 0.6;
        }
        
        const spriteSize = this.boss ? 64 : 48;
        const offsetX = spriteSize / 2;
        const offsetY = spriteSize - 6;
        
        if (this.boss) {
          ctx.drawImage(sprite, this.x - 24, this.y - 42, 48, 48);
        } else {
          ctx.drawImage(sprite, this.x - 24, this.y - 42, 48, 48);
        }
        
        ctx.restore();
        
        // HP bar
        const barW = this.boss ? 50 : 30;
        const barH = 3;
        const barX = this.x - barW / 2;
        const barY = this.y - 48;
        
        if (this.hp < this.maxHp) {
          ctx.fillStyle = '#333';
          ctx.fillRect(barX, barY, barW, barH);
          ctx.fillStyle = this.boss ? '#e74c3c' : '#e74c3c';
          ctx.fillRect(barX, barY, barW * (this.hp / this.maxHp), barH);
        }
        
        // Name for bosses
        if (this.boss) {
          ctx.fillStyle = '#fff';
          ctx.font = '10px Arial';
          ctx.textAlign = 'center';
        }
      },
      
      takeDamage(amount, isCrit) {
        const actualDmg = Math.max(1, amount - this.def);
        this.hp -= actualDmg;
        this.hurtTimer = 0.3;
        
        Game.showDamage(this.x, this.y - 40, actualDmg, isCrit ? '#ff4444' : '#ffffff');
        
        if (isCrit) {
          ParticleSystem.emit(this.x, this.y - 10, 8, '#f44', 0.3);
          Game.shake(3, 0.1);
        }
        
        // Knockback
        const dx = this.x - Player.x;
        const dy = this.y - Player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0) {
          const kb = 15;
          const newX = this.x + (dx / dist) * kb;
          const newY = this.y + (dy / dist) * kb;
          if (MapManager.isWalkable(newX, newY)) {
            this.x = newX;
            this.y = newY;
          }
        }
        
        if (this.aiState === 'idle' || this.aiState === 'patrol') {
          this.aiState = 'chase';
        }
        
        if (this.hp <= 0) {
          this.die();
        }
      },
      
      die() {
        this.alive = false;
        this.action = 'death';
        this.frame = 0;
        
        if (this.respawn) {
          this.respawnTimer = 15;
        }
        
        // Rewards
        Player.gainExp(this.exp);
        Player.addGold(this.gold);
        Player.killCount++;
        
        // Drop items
        if (Math.random() < 0.3) {
          Player.addItem({ id: 'hp_potion', icon: '❤️', name: 'HP Potion', type: 'potion' });
        }
        
        if (Math.random() < 0.15) {
          Player.addItem({ id: 'mp_potion', icon: '💙', name: 'MP Potion', type: 'potion' });
        }
        
        // Update quests
        QuestManager.onEnemyKill(this.type);
        
        // Effects
        ParticleSystem.emit(this.x, this.y, 15, '#f1c40f', 0.5);
        
        if (this.boss) {
          document.getElementById('bossHP').style.display = 'none';
          Game.shake(10, 0.5);
          Game.flash('rgba(255,255,255,0.5)', 300);
          Game.notify('🎉 Boss Defeated!');
          ParticleSystem.emit(this.x, this.y, 50, '#f1c40f', 1);
          ParticleSystem.emit(this.x, this.y, 30, '#e74c3c', 0.8);
        }
        
        Game.showDamage(this.x, this.y - 50, '+' + this.exp + ' EXP', '#f1c40f');
      }
    };
    
    this.enemies.push(enemy);
  },
  
  getEnemyStats(type) {
    switch(type) {
      case 'slime':
        return { hp: 30, atk: 5, def: 1, exp: 10, gold: 5, speed: 30, 
                 aggroRange: 80, attackRange: 25, width: 16, height: 10 };
      case 'goblin':
        return { hp: 50, atk: 10, def: 3, exp: 20, gold: 12, speed: 60,
                 aggroRange: 100, attackRange: 28, width: 18, height: 10 };
      case 'skeleton':
        return { hp: 80, atk: 15, def: 5, exp: 35, gold: 20, speed: 45,
                 aggroRange: 110, attackRange: 35, width: 18, height: 10 };
      case 'dark_knight':
        return { hp: 200, atk: 25, def: 10, exp: 100, gold: 80, speed: 55,
                 aggroRange: 120, attackRange: 40, width: 22, height: 12 };
      case 'dragon':
        return { hp: 500, atk: 40, def: 15, exp: 300, gold: 200, speed: 40,
                 aggroRange: 150, attackRange: 50, width: 32, height: 16 };
      default:
        return { hp: 30, atk: 5, def: 1, exp: 10, gold: 5, speed: 30,
                 aggroRange: 80, attackRange: 25 };
    }
  },
  
  update(dt) {
    this.enemies.forEach(e => e.update(dt));
  }
};

// ==========================================
// NPC MANAGER
// ==========================================
const NPCManager = {
  npcs: [],
  spriteCache: {},
  
  init() {
    this.npcs = [];
  },
  
  loadMapNPCs(npcDefs) {
    this.npcs = [];
    if (!npcDefs) return;
    
    npcDefs.forEach(def => {
      if (!this.spriteCache[def.type]) {
        this.spriteCache[def.type] = SpriteLib.generateNPCSprite(def.type);
      }
      
      this.npcs.push({
        type: def.type,
        name: def.name,
        x: def.x * Game.TILE,
        y: def.y * Game.TILE,
        dialogs: def.dialogs,
        dialogIndex: 0,
        shop: def.shop || false,
        sprites: this.spriteCache[def.type],
        direction: 'down',
        frame: 0,
        frameTimer: 0,
        
        update(dt) {
          this.frameTimer += dt;
          if (this.frameTimer >= 0.3) {
            this.frameTimer = 0;
            this.frame = (this.frame + 1) % 4;
          }
          
          // Face player when near
          const dx = Player.x - this.x;
          const dy = Player.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 60) {
            if (Math.abs(dx) > Math.abs(dy)) {
              this.direction = dx > 0 ? 'right' : 'left';
            } else {
              this.direction = dy > 0 ? 'down' : 'up';
            }
          }
        },
        
        render(ctx) {
          const key = `idle_${this.direction}`;
          const sprites = this.sprites[key];
          if (!sprites) return;
          
          const frame = this.frame % sprites.length;
          ctx.drawImage(sprites[frame], this.x - 24, this.y - 42, 48, 48);
          
          // Interaction indicator
          const dx = Player.x - this.x;
          const dy = Player.y - this.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 50) {
            ctx.fillStyle = '#f1c40f';
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('!', this.x, this.y - 50 + Math.sin(Date.now() * 0.005) * 3);
            
            ctx.fillStyle = '#fff';
            ctx.font = '10px Arial';
            ctx.fillText(this.name, this.x, this.y - 56);
          }
        }
      });
    });
  },
  
  checkInteraction() {
    // Auto-interact when close and pressing attack
    this.npcs.forEach(npc => {
      const dist = Math.sqrt(
        Math.pow(Player.x - npc.x, 2) + Math.pow(Player.y - npc.y, 2)
      );
      
      if (dist < 40 && Player.attacking) {
        Player.attacking = false;
        Player.attackTimer = 0;
        Player.action = 'idle';
        
        if (npc.dialogs && npc.dialogs.length > 0) {
          DialogManager.show(npc.name, npc.dialogs[npc.dialogIndex]);
          npc.dialogIndex = (npc.dialogIndex + 1) % npc.dialogs.length;
        }
      }
    });
  },
  
  update(dt) {
    this.npcs.forEach(n => n.update(dt));
  }
};

// ==========================================
// DIALOG MANAGER
// ==========================================
const DialogManager = {
  active: false,
  queue: [],
  currentText: '',
  displayedText: '',
  charIndex: 0,
  timer: 0,
  speed: 0.03,
  
  show(name, text) {
    this.active = true;
    this.currentText = text;
    this.displayedText = '';
    this.charIndex = 0;
    this.timer = 0;
    
    document.getElementById('dialogName').textContent = name;
    document.getElementById('dialogText').textContent = '';
    document.getElementById('dialogBox').style.display = 'block';
    
    this.typeText();
  },
  
  typeText() {
    if (!this.active) return;
    
    if (this.charIndex < this.currentText.length) {
      this.displayedText += this.currentText[this.charIndex];
      document.getElementById('dialogText').textContent = this.displayedText;
      this.charIndex++;
      setTimeout(() => this.typeText(), this.speed * 1000);
    }
  },
  
  advance() {
    if (this.charIndex < this.currentText.length) {
      // Show full text immediately
      this.displayedText = this.currentText;
      document.getElementById('dialogText').textContent = this.displayedText;
      this.charIndex = this.currentText.length;
    } else {
      this.close();
    }
  },
  
  close() {
    this.active = false;
    document.getElementById('dialogBox').style.display = 'none';
  }
};

// ==========================================
// PROJECTILE MANAGER
// ==========================================
const ProjectileManager = {
  projectiles: [],
  
  add(proj) {
    this.projectiles.push(proj);
  },
  
  update(dt) {
    this.projectiles = this.projectiles.filter(p => {
      p.timer += dt;
      
      if (p.type === 'aoe_ring') {
        p.radius = p.maxRadius * (p.timer / p.duration);
        return p.timer < p.duration;
      }
      
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      
      return p.timer < p.duration;
    });
  },
  
  render(ctx) {
    // Rendered in entity sort order, so minimal rendering here
  }
};

// Projectile render in entity array
ProjectileManager.projectiles.forEach = function(fn) {
  Array.prototype.forEach.call(this, function(p) {
    p.render = function(ctx) {
      if (this.type === 'aoe_ring') {
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 1 - (this.timer / this.duration);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    };
    fn(p);
  });
};

// ==========================================
// PARTICLE SYSTEM
// ==========================================
const ParticleSystem = {
  particles: [],
  
  emit(x, y, count, color, duration) {
    for (let i = 0; i < count; i++) {
      this.particles.push({
        x: x + (Math.random() - 0.5) * 10,
        y: y + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 100,
        vy: (Math.random() - 0.5) * 100 - 30,
        size: 1 + Math.random() * 3,
        color: color,
        life: duration || 0.5,
        maxLife: duration || 0.5
      });
    }
  },
  
  update(dt) {
    this.particles = this.particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 80 * dt; // gravity
      p.life -= dt;
      return p.life > 0;
    });
  },
  
  render(ctx) {
    this.particles.forEach(p => {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    });
    ctx.globalAlpha = 1;
  }
};

// ==========================================
// QUEST MANAGER
// ==========================================
const QuestManager = {
  quests: [],
  
  init() {
    this.quests = [
      {
        id: 'kill_slimes',
        title: 'Slime Cleanup',
        description: 'Defeat 5 slimes around the village',
        target: 5,
        progress: 0,
        enemyType: 'slime',
        completed: false,
        rewarded: false,
        rewards: { exp: 50, gold: 30 }
      },
      {
        id: 'kill_goblins',
        title: 'Goblin Threat',
        description: 'Eliminate 3 goblins in the Eastern Forest',
        target: 3,
        progress: 0,
        enemyType: 'goblin',
        completed: false,
        rewarded: false,
        rewards: { exp: 80, gold: 50 }
      },
      {
        id: 'kill_skeletons',
        title: 'Undead Purge',
        description: 'Destroy 5 skeletons',
        target: 5,
        progress: 0,
        enemyType: 'skeleton',
        completed: false,
        rewarded: false,
        rewards: { exp: 120, gold: 80 }
      },
      {
        id: 'kill_boss',
        title: 'Dragon Slayer',
        description: 'Defeat the Ancient Dragon Vexar',
        target: 1,
        progress: 0,
        enemyType: 'dragon',
        completed: false,
        rewarded: false,
        rewards: { exp: 500, gold: 300 }
      }
    ];
  },
  
  onEnemyKill(type) {
    this.quests.forEach(q => {
      if (q.enemyType === type && !q.completed) {
        q.progress++;
        if (q.progress >= q.target) {
          q.completed = true;
          this.completeQuest(q);
        }
      }
    });
  },
  
  completeQuest(quest) {
    if (quest.rewarded) return;
    quest.rewarded = true;
    
    Player.gainExp(quest.rewards.exp);
    Player.addGold(quest.rewards.gold);
    
    Game.notify('📜 Quest Complete: ' + quest.title);
    Game.flash('rgba(241,196,15,0.3)', 300);
    ParticleSystem.emit(Player.x, Player.y, 20, '#f1c40f', 0.8);
  },
  
  getSaveData() {
    return this.quests.map(q => ({
      id: q.id,
      progress: q.progress,
      completed: q.completed,
      rewarded: q.rewarded
    }));
  },
  
  loadData(data) {
    data.forEach(saved => {
      const quest = this.quests.find(q => q.id === saved.id);
      if (quest) {
        quest.progress = saved.progress;
        quest.completed = saved.completed;
        quest.rewarded = saved.rewarded;
      }
    });
  }
};

// ==========================================
// FIX: Projectile rendering
// ==========================================
const OrigProjectileUpdate = ProjectileManager.update;
ProjectileManager.update = function(dt) {
  this.projectiles = this.projectiles.filter(p => {
    p.timer += dt;
    
    if (p.type === 'aoe_ring') {
      p.radius = p.maxRadius * (p.timer / p.duration);
      p.render = function(ctx) {
        ctx.strokeStyle = p.color;
        ctx.lineWidth = 3;
        ctx.globalAlpha = 1 - (p.timer / p.duration);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      };
      p.y = p.y; // for sorting
      return p.timer < p.duration;
    }
    
    p.x += (p.vx || 0) * dt;
    p.y += (p.vy || 0) * dt;
    p.render = function(ctx) {};
    
    return p.timer < p.duration;
  });
};
