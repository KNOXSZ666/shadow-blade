<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0">
<title>Bóng Đêm Ký Sự</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;touch-action:none}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#G{position:relative;width:100%;height:100%;overflow:hidden}
#C{position:absolute;top:0;left:0}
#U{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#U>*{pointer-events:auto}

/* Title Screen */
#title{position:absolute;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0a0515 0%,#1a0a2e 40%,#0d1a0a 100%)}
#title canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
.t-content{position:relative;z-index:1;text-align:center}
.t-logo{font-size:36px;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(120,80,255,0.6),0 0 60px rgba(120,80,255,0.3),0 4px 8px rgba(0,0,0,0.8);letter-spacing:4px;margin-bottom:4px}
.t-sub{font-size:12px;color:rgba(180,160,220,0.8);letter-spacing:8px;margin-bottom:50px;text-transform:uppercase}
.t-class-select{display:flex;gap:12px;justify-content:center;margin-bottom:30px;flex-wrap:wrap;padding:0 20px}
.t-class{width:90px;padding:12px 8px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;text-align:center;transition:all 0.3s}
.t-class.selected{border-color:#a855f7;background:rgba(168,85,247,0.15);box-shadow:0 0 20px rgba(168,85,247,0.3)}
.t-class:active{transform:scale(0.95)}
.t-class-icon{font-size:32px;display:block;margin-bottom:6px}
.t-class-name{color:#fff;font-size:11px;font-weight:bold}
.t-class-desc{color:#999;font-size:8px;margin-top:2px}
.t-btn{width:200px;padding:14px;margin:6px auto;background:linear-gradient(135deg,rgba(168,85,247,0.3),rgba(120,60,200,0.2));border:1px solid rgba(168,85,247,0.5);border-radius:25px;color:#e0d0ff;text-align:center;font-size:14px;cursor:pointer;letter-spacing:2px;transition:all 0.2s}
.t-btn:active{background:linear-gradient(135deg,rgba(168,85,247,0.5),rgba(120,60,200,0.4));transform:scale(0.97)}
.t-btn.disabled{opacity:0.4;pointer-events:none}

/* HUD */
#hud{position:absolute;top:0;left:0;width:100%;padding:8px;z-index:20}
#hud-top{display:flex;align-items:flex-start;gap:8px}
#portrait{width:48px;height:48px;border-radius:10px;border:2px solid #a855f7;background:rgba(0,0,0,0.6);overflow:hidden;position:relative;flex-shrink:0}
#portrait canvas{width:100%;height:100%}
#portrait-lvl{position:absolute;bottom:0;right:0;background:#a855f7;color:#fff;font-size:8px;font-weight:bold;padding:1px 4px;border-radius:4px 0 0 0}
#bars{flex:1;padding-top:2px}
.hbar{height:14px;border-radius:7px;margin-bottom:3px;position:relative;overflow:hidden}
.hbar-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:7px}
.hbar-fill{position:absolute;top:1px;left:1px;height:calc(100% - 2px);border-radius:6px;transition:width 0.3s}
.hbar-shine{position:absolute;top:1px;left:1px;height:40%;width:calc(100% - 2px);border-radius:6px 6px 0 0;background:linear-gradient(180deg,rgba(255,255,255,0.25),transparent)}
.hbar-text{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px;font-weight:bold;text-shadow:0 1px 2px rgba(0,0,0,0.8);z-index:1}
.hp-fill{background:linear-gradient(90deg,#16a34a,#22c55e,#4ade80)}
.mp-fill{background:linear-gradient(90deg,#2563eb,#3b82f6,#60a5fa)}
.exp-bar{height:6px;margin-bottom:0}
.exp-fill{background:linear-gradient(90deg,#d97706,#f59e0b,#fbbf24)}

#hud-right{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;align-items:flex-end;gap:4px;z-index:20}
#gold-display{background:rgba(0,0,0,0.6);border:1px solid rgba(251,191,36,0.4);border-radius:12px;padding:4px 10px;color:#fbbf24;font-size:11px;font-weight:bold;display:flex;align-items:center;gap:4px}
#room-display{background:rgba(0,0,0,0.6);border:1px solid rgba(168,85,247,0.3);border-radius:12px;padding:3px 8px;color:#c084fc;font-size:9px}
#key-display{background:rgba(0,0,0,0.6);border:1px solid rgba(234,179,8,0.3);border-radius:12px;padding:3px 8px;color:#fbbf24;font-size:9px;display:none}

/* Minimap */
#minimap{position:absolute;top:60px;right:8px;width:80px;height:80px;border:2px solid rgba(255,255,255,0.15);border-radius:8px;overflow:hidden;background:rgba(0,0,0,0.5);z-index:15}
#minimap canvas{width:100%;height:100%;image-rendering:pixelated}

/* Skills */
#skills{position:absolute;bottom:85px;right:8px;display:flex;gap:6px;z-index:20}
.skill-btn{width:44px;height:44px;border-radius:10px;position:relative;cursor:pointer;overflow:hidden}
.skill-bg{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:10px;border:2px solid rgba(255,255,255,0.2)}
.skill-icon{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px}
.skill-cd{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);border-radius:10px;display:none;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:bold}
.skill-btn:active{transform:scale(0.9)}
.skill-key{position:absolute;bottom:1px;right:3px;font-size:7px;color:rgba(255,255,255,0.5)}

/* Joystick */
#jZone{position:absolute;bottom:15px;left:15px;width:130px;height:130px;z-index:25}
#jBase{width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.08),rgba(255,255,255,0.02));border:2px solid rgba(255,255,255,0.12);position:absolute;left:10px;top:10px}
#jThumb{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,0.35),rgba(255,255,255,0.1));border:2px solid rgba(255,255,255,0.25);position:absolute;left:41px;top:41px;transition:none}

/* Action buttons */
#actBtns{position:absolute;bottom:12px;right:8px;z-index:25}
.act-btn{position:absolute;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;border:2px solid rgba(255,255,255,0.2);box-shadow:0 2px 8px rgba(0,0,0,0.5)}
.act-btn:active{transform:scale(0.88)}
#btnAtk{background:radial-gradient(circle,rgba(239,68,68,0.7),rgba(185,28,28,0.5));bottom:20px;right:70px}
#btnDash{background:radial-gradient(circle,rgba(34,197,94,0.7),rgba(22,163,74,0.5));bottom:20px;right:180px}
#btnInteract{background:radial-gradient(circle,rgba(251,191,36,0.7),rgba(217,119,6,0.5));bottom:75px;right:125px;width:42px;height:42px;font-size:16px;display:none}

/* Floating texts */
.ftext{position:absolute;pointer-events:none;z-index:30;font-weight:900;text-shadow:0 2px 4px rgba(0,0,0,0.8),-1px -1px 0 rgba(0,0,0,0.5),1px 1px 0 rgba(0,0,0,0.5);animation:ftAnim 1s ease-out forwards;white-space:nowrap}
@keyframes ftAnim{0%{opacity:1;transform:translateY(0) scale(0.8)}15%{transform:translateY(-10px) scale(1.1)}100%{opacity:0;transform:translateY(-50px) scale(0.9)}}
.ftext.crit{animation:ftCrit 1s ease-out forwards;color:#fbbf24!important}
@keyframes ftCrit{0%{opacity:1;transform:translateY(0) scale(0.5)}10%{transform:translateY(-5px) scale(1.4)}20%{transform:translateY(-12px) scale(1.1)}100%{opacity:0;transform:translateY(-55px) scale(0.8)}}
.ftext.heal{color:#4ade80!important;animation:ftHeal 0.8s ease-out forwards}
@keyframes ftHeal{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px)}}

/* Room clear banner */
#banner{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);z-index:35;opacity:0;pointer-events:none;text-align:center;transition:opacity 0.5s}
#banner-text{color:#fff;font-size:22px;font-weight:bold;text-shadow:0 0 20px rgba(168,85,247,0.6);letter-spacing:3px}
#banner-sub{color:rgba(200,180,240,0.8);font-size:11px;margin-top:4px;letter-spacing:4px}

/* Chest/Reward */
#reward{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center}
#reward-title{color:#fbbf24;font-size:18px;font-weight:bold;margin-bottom:15px;letter-spacing:2px}
#reward-items{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;padding:0 20px}
.reward-item{width:70px;padding:10px 5px;background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);border-radius:10px;text-align:center;cursor:pointer}
.reward-item:active{background:rgba(255,255,255,0.12)}
.reward-item.rC{border-color:rgba(200,200,200,0.4)}
.reward-item.rR{border-color:rgba(59,130,246,0.5);box-shadow:0 0 8px rgba(59,130,246,0.2)}
.reward-item.rE{border-color:rgba(168,85,247,0.5);box-shadow:0 0 8px rgba(168,85,247,0.2)}
.reward-item.rL{border-color:rgba(251,191,36,0.5);box-shadow:0 0 12px rgba(251,191,36,0.2);animation:legendGlow 2s infinite}
@keyframes legendGlow{0%,100%{box-shadow:0 0 8px rgba(251,191,36,0.2)}50%{box-shadow:0 0 16px rgba(251,191,36,0.4)}}
.ri-icon{font-size:28px;display:block;margin-bottom:4px}
.ri-name{font-size:9px;color:#fff}
.ri-stat{font-size:8px;color:#4ade80;margin-top:2px}
#reward-btn{padding:10px 30px;background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:20px;color:#fff;font-size:13px;cursor:pointer;letter-spacing:1px}
#reward-btn:active{transform:scale(0.95)}

/* Pause/Menu */
#pause{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center}
#pause-title{color:#c084fc;font-size:22px;font-weight:bold;margin-bottom:20px;letter-spacing:3px}
.p-btn{width:180px;padding:12px;margin:4px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#ddd;text-align:center;font-size:13px;cursor:pointer}
.p-btn:active{background:rgba(255,255,255,0.12)}

/* Inventory */
#inv{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,5,15,0.95);z-index:60;display:none;flex-direction:column}
#inv-head{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid rgba(255,255,255,0.08)}
#inv-title{color:#c084fc;font-size:16px;font-weight:bold;letter-spacing:2px}
#inv-close{color:#fff;font-size:20px;cursor:pointer;padding:5px 10px}
#inv-tabs{display:flex;gap:0;border-bottom:1px solid rgba(255,255,255,0.08)}
.inv-tab{flex:1;padding:8px;text-align:center;color:#888;font-size:11px;cursor:pointer;border-bottom:2px solid transparent}
.inv-tab.active{color:#c084fc;border-bottom-color:#a855f7}
#inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px;overflow-y:auto;flex:1}
.inv-slot{aspect-ratio:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;position:relative;cursor:pointer}
.inv-slot.equipped{border-color:#a855f7;background:rgba(168,85,247,0.1)}
.inv-slot .slot-count{position:absolute;bottom:2px;right:4px;font-size:8px;color:#fff;text-shadow:0 1px 2px #000}
.inv-slot .slot-rarity{position:absolute;top:0;left:0;width:100%;height:2px;border-radius:4px 4px 0 0}

/* Shop */
#shop{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,5,15,0.95);z-index:60;display:none;flex-direction:column}
.shop-item{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer}
.shop-item:active{background:rgba(255,255,255,0.05)}
.shop-item-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:24px;background:rgba(255,255,255,0.04);border-radius:8px;margin-right:10px;flex-shrink:0}
.shop-item-info{flex:1}
.shop-item-name{color:#fff;font-size:12px;font-weight:bold}
.shop-item-desc{color:#888;font-size:9px;margin-top:2px}
.shop-item-price{color:#fbbf24;font-size:12px;font-weight:bold;display:flex;align-items:center;gap:3px}
.shop-item.locked{opacity:0.4}

/* Boss HP */
#bossBar{position:absolute;top:50px;left:50%;transform:translateX(-50%);width:70%;max-width:350px;z-index:15;display:none;text-align:center}
#bossName{color:#ef4444;font-size:11px;font-weight:bold;margin-bottom:2px;text-shadow:0 0 10px rgba(239,68,68,0.4);letter-spacing:1px}
#bossBarBg{width:100%;height:10px;background:rgba(0,0,0,0.7);border:1px solid rgba(239,68,68,0.5);border-radius:5px;overflow:hidden}
#bossBarFill{height:100%;background:linear-gradient(90deg,#991b1b,#ef4444);transition:width 0.3s;width:100%}

/* Screen effects */
#flash{position:absolute;top:0;left:0;width:100%;height:100%;z-index:40;pointer-events:none;opacity:0;transition:opacity 0.08s}
#vignette{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 60%,rgba(0,0,0,0.4) 100%);z-index:5;pointer-events:none}

/* Notifications */
.notif{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid rgba(168,85,247,0.4);border-radius:16px;padding:6px 16px;color:#e0d0ff;font-size:11px;z-index:35;white-space:nowrap;animation:notifAnim 2.5s ease-out forwards;pointer-events:none}
@keyframes notifAnim{0%{opacity:0;transform:translateX(-50%) translateY(10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}

/* Menu button */
#menuBtn{position:absolute;top:56px;left:8px;width:30px;height:30px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:6px;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:20;cursor:pointer}

/* Death screen */
#death{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(10,0,0,0.9);z-index:70;display:none;flex-direction:column;align-items:center;justify-content:center}
#death-title{color:#ef4444;font-size:28px;font-weight:bold;margin-bottom:10px;text-shadow:0 0 20px rgba(239,68,68,0.5)}
#death-stats{color:#999;font-size:12px;margin-bottom:20px;text-align:center;line-height:1.8}
</style>
</head>
<body>
<div id="G">
<canvas id="C"></canvas>
<div id="U">
<div id="vignette"></div>
<div id="flash"></div>

<!-- Title -->
<div id="title">
<canvas id="titleBg"></canvas>
<div class="t-content">
<div class="t-logo">BÓNG ĐÊM KÝ SỰ</div>
<div class="t-sub">Shadow Chronicle</div>
<div class="t-class-select" id="classSelect"></div>
<div class="t-btn" id="btnStart">BẮT ĐẦU</div>
<div class="t-btn" style="background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.2);font-size:11px" onclick="showHelp()">HƯỚNG DẪN</div>
</div>
</div>

<!-- HUD -->
<div id="hud" style="display:none">
<div id="hud-top">
<div id="portrait"><canvas id="portCanvas" width="48" height="48"></canvas><div id="portrait-lvl">1</div></div>
<div id="bars">
<div class="hbar"><div class="hbar-bg"></div><div class="hbar-fill hp-fill" id="hpFill" style="width:100%"></div><div class="hbar-shine"></div><div class="hbar-text" id="hpText">100/100</div></div>
<div class="hbar"><div class="hbar-bg"></div><div class="hbar-fill mp-fill" id="mpFill" style="width:100%"></div><div class="hbar-shine"></div><div class="hbar-text" id="mpText">50/50</div></div>
<div class="hbar exp-bar"><div class="hbar-bg"></div><div class="hbar-fill exp-fill" id="expFill" style="width:0%"></div></div>
</div>
</div>
</div>

<div id="hud-right" style="display:none">
<div id="gold-display">🪙 <span id="goldVal">0</span></div>
<div id="room-display">Tầng 1 · Phòng 1</div>
<div id="key-display">🔑 0</div>
</div>

<div id="minimap" style="display:none"><canvas id="mmCanvas" width="80" height="80"></canvas></div>
<div id="menuBtn" style="display:none" onclick="togglePause()">☰</div>

<!-- Skills -->
<div id="skills" style="display:none"></div>

<!-- Controls -->
<div id="jZone" style="display:none"><div id="jBase"><div id="jThumb"></div></div></div>
<div id="actBtns" style="display:none">
<div class="act-btn" id="btnAtk">⚔️</div>
<div class="act-btn" id="btnDash">💨</div>
<div class="act-btn" id="btnInteract">💬</div>
</div>

<!-- Banner -->
<div id="banner"><div id="banner-text"></div><div id="banner-sub"></div></div>

<!-- Boss HP -->
<div id="bossBar"><div id="bossName"></div><div id="bossBarBg"><div id="bossBarFill"></div></div></div>

<!-- Panels -->
<div id="reward"></div>
<div id="pause">
<div id="pause-title">TẠM DỪNG</div>
<div class="p-btn" onclick="showInv()">🎒 Trang Bị</div>
<div class="p-btn" onclick="showShopPanel()">🏪 Cửa Hàng</div>
<div class="p-btn" onclick="saveGame()">💾 Lưu Game</div>
<div class="p-btn" onclick="togglePause()">▶️ Tiếp Tục</div>
<div class="p-btn" onclick="quitToTitle()">🏠 Về Menu</div>
</div>
<div id="inv"></div>
<div id="shop"></div>
<div id="death"></div>
</div>
</div>

<script>
// ===============================
// BÓNG ĐÊM KÝ SỰ - Engine Core
// ===============================
const W=()=>window.innerWidth, H=()=>window.innerHeight;
let canvas,ctx,raf,lastT=0,dt=0,gameState='title';
let cam={x:0,y:0,shake:{x:0,y:0,t:0,i:0}};

// Audio
const Audio={
  ctx:null,enabled:true,
  init(){try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){this.enabled=false}},
  resume(){if(this.ctx?.state==='suspended')this.ctx.resume()},
  tone(f,d,type,v,atk){
    if(!this.enabled||!this.ctx)return;this.resume();
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=type||'square';o.frequency.value=f;
    const n=this.ctx.currentTime;v=(v||0.3)*0.35;
    g.gain.setValueAtTime(0,n);
    g.gain.linearRampToValueAtTime(v,n+(atk||0.01));
    g.gain.exponentialRampToValueAtTime(0.001,n+d);
    o.connect(g);g.connect(this.ctx.destination);
    o.start(n);o.stop(n+d+0.05);
  },
  noise(d,v,ff){
    if(!this.enabled||!this.ctx)return;this.resume();
    const s=this.ctx.sampleRate*d,b=this.ctx.createBuffer(1,s,this.ctx.sampleRate),data=b.getChannelData(0);
    for(let i=0;i<s;i++)data[i]=Math.random()*2-1;
    const src=this.ctx.createBufferSource();src.buffer=b;
    const g=this.ctx.createGain();g.gain.setValueAtTime((v||0.2)*0.35,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d);
    if(ff){const f=this.ctx.createBiquadFilter();f.type=ff.t||'lowpass';f.frequency.value=ff.f||2000;src.connect(f);f.connect(g)}else src.connect(g);
    g.connect(this.ctx.destination);src.start();
  },
  slash(){this.noise(0.1,0.4,{t:'highpass',f:3000});this.tone(800,0.07,'sawtooth',0.15)},
  hit(){this.noise(0.08,0.4,{t:'bandpass',f:1500});this.tone(300,0.08,'square',0.2);this.tone(200,0.06,'square',0.15)},
  crit(){this.noise(0.12,0.5,{t:'bandpass',f:2000});this.tone(600,0.04,'square',0.3);setTimeout(()=>this.tone(1200,0.08,'sine',0.2),40)},
  dash(){this.noise(0.12,0.2,{t:'highpass',f:5000});this.tone(500,0.08,'sine',0.12);this.tone(700,0.06,'sine',0.1)},

  skill2(){this.tone(200,0.15,'sine',0.15);setTimeout(()=>{this.noise(0.25,0.5,{t:'lowpass',f:800});this.tone(150,0.25,'sine',0.3)},80);setTimeout(()=>this.tone(500,0.12,'sine',0.15),180)},
  skill3(){this.tone(300,0.1,'triangle',0.15);this.tone(600,0.1,'triangle',0.12);setTimeout(()=>{this.tone(900,0.15,'sine',0.2);this.noise(0.15,0.3,{t:'highpass',f:4000})},60)},

// ===============================
// PIXEL ART RENDERER
// ===============================
const Pix={
  // Draw pixel at scale
  p(ctx,x,y,c,s=2){ctx.fillStyle=c;ctx.fillRect(x,y,s,s)},
  
  // Palette
  pal:{
    warrior:{skin:'#f0c8a0',skinD:'#d4a878',hair:'#554433',hairD:'#332211',
      armor:'#7788aa',armorD:'#556688',armorL:'#99aabb',
      cape:'#cc3344',capeD:'#991122',
      sword:'#ddeeff',hilt:'#997733',
      boot:'#554433',bootD:'#332211'},
    mage:{skin:'#f0d0b0',skinD:'#d4a888',hair:'#eeddcc',hairD:'#ccbbaa',
      robe:'#5544aa',robeD:'#332288',robeL:'#7766cc',
      staff:'#886644',staffOrb:'#44ddff',staffOrbD:'#2299bb',
      boot:'#443355',bootD:'#221133'},
    archer:{skin:'#e8c098',skinD:'#c8a070',hair:'#88aa44',hairD:'#668822',
      vest:'#557744',vestD:'#335522',vestL:'#779966',
      cape:'#446633',capeD:'#224411',
      bow:'#886644',bowS:'#ccaa66',
      boot:'#665533',bootD:'#443311'},
  },
  
  drawChar(ctx,cx,cy,classId,dir,action,frame,total,palette){
    const p=palette||this.pal[classId];
    if(!p)return;
    ctx.imageSmoothingEnabled=false;
    
    const s=2; // pixel size
    let bobY=0,legOff=0,armOff=0;
    
    if(action==='idle'){bobY=Math.sin(frame/total*Math.PI*2)*1}
    else if(action==='walk'){bobY=Math.sin(frame/total*Math.PI*2)*1.5;legOff=Math.sin(frame/total*Math.PI*2)*3}
    else if(action==='attack'){bobY=-Math.sin(frame/total*Math.PI)*2;armOff=frame/total}
    else if(action==='hurt'){bobY=frame===1?-3:0}
    else if(action==='dash'){bobY=0}
    
    const bx=cx-12*s/2, by=cy-26*s/2+bobY;
    const flip=dir==='left';
    
    ctx.save();
    if(flip){ctx.translate(cx*2,0);ctx.scale(-1,1)}
    
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();ctx.ellipse(cx,cy+2,10,4,0,0,Math.PI*2);ctx.fill();
    
    if(classId==='warrior')this.drawWarrior(ctx,bx,by,p,s,action,frame,total,legOff,armOff);
    else if(classId==='mage')this.drawMage(ctx,bx,by,p,s,action,frame,total,legOff);
    else if(classId==='archer')this.drawArcher(ctx,bx,by,p,s,action,frame,total,legOff,armOff);
    
    ctx.restore();
  },
  
  drawWarrior(ctx,bx,by,c,s,action,frame,total,legOff,armOff){
    const p=(x,y,col)=>{ctx.fillStyle=col;ctx.fillRect(bx+x*s,by+y*s,s,s)};
    
    // Cape
    for(let i=0;i<5;i++){
      p(4+i,14+Math.sin(frame*0.4+i)*0.5,c.cape);
      p(4+i,15+Math.sin(frame*0.3+i)*0.7,c.capeD);
      p(4+i,16+Math.sin(frame*0.3+i)*1,c.cape);
    }
    
    // Legs
    p(5,18+legOff*0.3,c.boot);p(5,19+legOff*0.3,c.bootD);p(5,20+legOff*0.3,c.bootD);
    p(8,18-legOff*0.3,c.boot);p(8,19-legOff*0.3,c.bootD);p(8,20-legOff*0.3,c.bootD);
    
    // Body armor
    for(let i=0;i<5;i++){
      p(4+i,10,i===2?c.armorL:c.armor);
      p(4+i,11,c.armor);
      p(4+i,12,c.armorD);
      p(4+i,13,c.armor);
      p(4+i,14,c.armorD);
    }
    // Shoulders
    p(3,10,c.armorL);p(3,11,c.armor);
    p(9,10,c.armorL);p(9,11,c.armor);
    
    // Head
    for(let i=0;i<4;i++){
      p(4+i,1,c.hair);p(4+i,2,c.hair);
      p(4+i,3,c.skin);p(4+i,4,c.skin);
      p(4+i,5,c.skin);p(4+i,6,c.skinD);
    }
    p(3,2,c.hair);p(8,2,c.hair);
    // Helmet accent
    p(4,2,'#8B7355');p(7,2,'#8B7355');
    ctx.fillStyle='#f1c40f';ctx.fillRect(bx+5.5*s,by+1.2*s,s*0.8,s*0.8);
    // Eyes
    ctx.fillStyle='#223';
    ctx.fillRect(bx+4.5*s,by+4*s,s*0.6,s*0.6);
    ctx.fillRect(bx+6.8*s,by+4*s,s*0.6,s*0.6);
    
    // Sword
    if(action==='attack'){
      const sw=armOff;
      for(let i=0;i<8;i++){
        const a=-Math.PI/2+sw*Math.PI*1.3;
        const sx=bx+10*s+Math.cos(a)*i*s*1.2;
        const sy=by+11*s+Math.sin(a)*i*s*1.2;
        ctx.fillStyle=i<2?c.hilt:c.sword;
        ctx.fillRect(sx,sy,s,s);
      }
      // Slash effect
      if(frame>=Math.floor(total*0.4)&&frame<=Math.floor(total*0.7)){
        ctx.strokeStyle='rgba(200,220,255,0.5)';ctx.lineWidth=2;
        ctx.beginPath();ctx.arc(bx+11*s,by+9*s,10+frame*2,-0.5,1.2);ctx.stroke();
        ctx.strokeStyle='rgba(200,220,255,0.3)';
        ctx.beginPath();ctx.arc(bx+11*s,by+9*s,14+frame*2,-0.3,1.0);ctx.stroke();
      }
    }else{
      for(let i=0;i<6;i++){ctx.fillStyle=i<1?c.hilt:c.sword;ctx.fillRect(bx+10*s,by+(9+i*1.2)*s,s,s)}
      // Crossguard
      ctx.fillStyle=c.hilt;ctx.fillRect(bx+9*s,by+10.5*s,s*3,s*0.6);
    }
    
    // Shield
    p(2,11,'#667');p(2,12,'#556');p(2,13,'#667');
    p(3,11,'#778');p(3,12,'#f1c40f');p(3,13,'#778');
  },
  
  drawMage(ctx,bx,by,c,s,action,frame,total,legOff){
    const p=(x,y,col)=>{ctx.fillStyle=col;ctx.fillRect(bx+x*s,by+y*s,s,s)};
    
    // Robe bottom
    for(let i=0;i<6;i++){
      p(3+i,16,c.robe);p(3+i,17,c.robeD);p(3+i,18,c.robe);
      p(3+i,19,c.robeD);p(3+i,20,c.robe);
    }
    
    // Legs (hidden by robe, just boots)
    p(4,19+legOff*0.2,c.boot);p(4,20+legOff*0.2,c.bootD);
    p(8,19-legOff*0.2,c.boot);p(8,20-legOff*0.2,c.bootD);
    
    // Body
    for(let i=0;i<5;i++){
      p(4+i,10,c.robeL);p(4+i,11,c.robe);
      p(4+i,12,c.robeD);p(4+i,13,c.robe);
      p(4+i,14,c.robeD);p(4+i,15,c.robe);
    }
    // Belt
    p(4,14,'#aa8833');p(5,14,'#ccaa44');p(6,14,'#ccaa44');p(7,14,'#ccaa44');p(8,14,'#aa8833');
    
    // Head
    for(let i=0;i<4;i++){
      p(4+i,1,c.hair);
      p(4+i,3,c.skin);p(4+i,4,c.skin);
      p(4+i,5,c.skin);p(4+i,6,c.skinD);
    }
    // Hat
    p(3,1,c.robeD);p(4,0,c.robe);p(5,0,c.robe);p(6,0,c.robeL);p(7,1,c.robeD);
    p(5,-1,c.robeL); // Hat tip
    // Hat brim
    p(2,2,c.robeD);p(3,2,c.robe);p(4,2,c.robe);p(5,2,c.robe);p(6,2,c.robe);p(7,2,c.robe);p(8,2,c.robe);p(9,2,c.robeD);
    
    // Eyes
    ctx.fillStyle='#88ddff';
    ctx.fillRect(bx+4.5*s,by+4*s,s*0.6,s*0.6);
    ctx.fillRect(bx+6.8*s,by+4*s,s*0.6,s*0.6);
    
    // Staff
    const staffBob=Math.sin(frame/total*Math.PI*2)*0.5;
    for(let i=0;i<10;i++){ctx.fillStyle=c.staff;ctx.fillRect(bx+10*s,by+(3+i)*s+staffBob,s,s)}
    // Orb
    ctx.fillStyle=c.staffOrb;
    ctx.beginPath();ctx.arc(bx+10.5*s,by+2*s+staffBob,s*1.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=c.staffOrbD;
    ctx.beginPath();ctx.arc(bx+10.5*s,by+2*s+staffBob,s*0.8,0,Math.PI*2);ctx.fill();
    // Orb glow
    ctx.fillStyle='rgba(68,221,255,0.15)';
    ctx.beginPath();ctx.arc(bx+10.5*s,by+2*s+staffBob,s*3,0,Math.PI*2);ctx.fill();
    
    // Magic effect on attack
    if(action==='attack'){
      const t=frame/total;
      ctx.fillStyle='rgba(68,221,255,0.3)';
      for(let i=0;i<6;i++){
        const a=t*Math.PI*2+i*Math.PI/3;
        const px=bx+6*s+Math.cos(a)*(8+t*15);
        const py=by+10*s+Math.sin(a)*(8+t*15);
        ctx.beginPath();ctx.arc(px,py,2+t*3,0,Math.PI*2);ctx.fill();
      }
    }
  },
  
  drawArcher(ctx,bx,by,c,s,action,frame,total,legOff,armOff){
    const p=(x,y,col)=>{ctx.fillStyle=col;ctx.fillRect(bx+x*s,by+y*s,s,s)};
    
    // Cape
    for(let i=0;i<4;i++){
      p(4+i,14+Math.sin(frame*0.4+i)*0.5,c.cape);
      p(4+i,15+Math.sin(frame*0.3+i)*0.7,c.capeD);
    }
    
    // Legs
    p(5,17+legOff*0.3,c.boot);p(5,18+legOff*0.3,c.bootD);p(5,19+legOff*0.3,c.bootD);
    p(8,17-legOff*0.3,c.boot);p(8,18-legOff*0.3,c.bootD);p(8,19-legOff*0.3,c.bootD);
    
    // Body
    for(let i=0;i<5;i++){
      p(4+i,10,c.vestL);p(4+i,11,c.vest);
      p(4+i,12,c.vestD);p(4+i,13,c.vest);
      p(4+i,14,c.vestD);
    }
    
    // Head
    for(let i=0;i<4;i++){
      p(4+i,2,c.hair);p(4+i,3,c.skin);
      p(4+i,4,c.skin);p(4+i,5,c.skin);
      p(4+i,6,c.skinD);
    }
    p(3,3,c.hair);p(8,3,c.hairD);
    p(4,1,c.hair);p(5,1,c.hair);p(6,1,c.hairD);
    // Hood hint
    p(3,2,c.capeD);p(8,2,c.cape);
    
    // Eyes
    ctx.fillStyle='#4a2';
    ctx.fillRect(bx+4.5*s,by+4*s,s*0.6,s*0.6);
    ctx.fillRect(bx+6.8*s,by+4*s,s*0.6,s*0.6);
    
    // Bow
    ctx.strokeStyle=c.bow;ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.arc(bx+10.5*s,by+10*s,s*4,- Math.PI*0.4,Math.PI*0.4);
    ctx.stroke();
    // Bowstring
    ctx.strokeStyle=c.bowS;ctx.lineWidth=0.8;
    ctx.beginPath();
    const bowPull=action==='attack'?armOff*3:0;
    ctx.moveTo(bx+10.5*s+Math.cos(-Math.PI*0.4)*s*4,by+10*s+Math.sin(-Math.PI*0.4)*s*4);
    ctx.lineTo(bx+10.5*s-bowPull,by+10*s);
    ctx.lineTo(bx+10.5*s+Math.cos(Math.PI*0.4)*s*4,by+10*s+Math.sin(Math.PI*0.4)*s*4);
    ctx.stroke();
    
    // Arrow
    if(action==='attack'&&frame<total*0.6){
      ctx.fillStyle='#aa8855';
      ctx.fillRect(bx+(10.5-bowPull/s)*s-3,by+10*s-0.5,8,1.5);
      ctx.fillStyle='#ccc';
      ctx.fillRect(bx+(10.5-bowPull/s)*s+4,by+10*s-1,3,2);
    }
  },
  
  // Enemy sprites
  drawEnemy(ctx,cx,cy,type,dir,action,frame,total){
    ctx.imageSmoothingEnabled=false;
    const s=2;
    const bx=cx-12,by=cy-24;
    const flip=dir==='left';
    ctx.save();
    if(flip){ctx.translate(cx*2,0);ctx.scale(-1,1)}
    
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath();ctx.ellipse(cx,cy+2,10,4,0,0,Math.PI*2);ctx.fill();
    
    if(type==='slime')this.eSlime(ctx,cx,cy,action,frame,total);
    else if(type==='skeleton')this.eSkeleton(ctx,bx,by,s,action,frame,total);
    else if(type==='goblin')this.eGoblin(ctx,bx,by,s,action,frame,total);
    else if(type==='orc')this.eOrc(ctx,bx,by,s,action,frame,total);
    else if(type==='demon')this.eDemon(ctx,bx,by,s,action,frame,total);
    else if(type==='dragon')this.eDragon(ctx,cx,cy,s,action,frame,total);
    
    if(action==='death'){ctx.globalAlpha=1-frame/total}
    ctx.restore();
  },
  
  eSlime(ctx,cx,cy,action,frame,total){
    const sq=action==='idle'?Math.sin(frame/total*Math.PI*2)*2:0;
    const jy=action==='attack'?-Math.sin(frame/total*Math.PI)*8:0;
    const x=cx-10,y=cy-14+jy;
    
    // Body gradient
    const grd=ctx.createRadialGradient(cx,cy-6+jy,2,cx,cy-4+jy,12);
    grd.addColorStop(0,'#66ee66');grd.addColorStop(0.6,'#44bb44');grd.addColorStop(1,'#228822');
    ctx.fillStyle=grd;
    ctx.beginPath();
    ctx.moveTo(x+2,y+12);
    ctx.quadraticCurveTo(x,y+8+sq,x+4,y+4-sq);
    ctx.quadraticCurveTo(x+10,y-2-sq*1.5,x+16,y+4-sq);
    ctx.quadraticCurveTo(x+20,y+8+sq,x+18,y+12);
    ctx.closePath();ctx.fill();
    
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.ellipse(cx-2,cy-10+jy-sq,3,2,0,0,Math.PI*2);ctx.fill();
    
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(cx-3,cy-6+jy,2.5,3,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+3,cy-6+jy,2.5,3,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(cx-2.5,cy-5+jy,1.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+3.5,cy-5+jy,1.2,0,Math.PI*2);ctx.fill();
  },
  
  eSkeleton(ctx,bx,by,s,action,frame,total){
    const p=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(bx+x*s,by+y*s,s,s)};
    const bone='#e8e0d0',boneD='#c8b8a0',boneL='#f5f0e8';
    const lo=action==='walk'?Math.sin(frame/total*Math.PI*2)*2:0;
    
    // Legs
    p(5,18+lo,bone);p(5,19+lo,boneD);p(5,20+lo,bone);
    p(8,18-lo,bone);p(8,19-lo,boneD);p(8,20-lo,bone);
    
    // Ribcage
    for(let i=0;i<4;i++){p(5+i,10,bone);p(5+i,11,i%2?boneD:bone);p(5+i,12,bone);p(5+i,13,boneD);p(5+i,14,bone);p(5+i,15,boneD);p(5+i,16,bone)}
    
    // Skull
    for(let i=0;i<3;i++){p(5+i,3,boneL);p(5+i,4,bone);p(5+i,5,bone);p(5+i,6,bone);p(5+i,7,boneD);p(5+i,8,bone)}
    p(6,2,boneL);
    // Eye sockets
    p(5,5,'#111');p(7,5,'#111');
    ctx.fillStyle='#ff3333';ctx.fillRect(bx+5.3*s,by+5.3*s,s*0.5,s*0.5);ctx.fillRect(bx+7.3*s,by+5.3*s,s*0.5,s*0.5);
    // Jaw
    p(5,7,boneD);p(6,7,bone);p(7,7,boneD);
    
    // Sword
    if(action==='attack'){
      const sw=frame/total*Math.PI;
      for(let i=0;i<7;i++){const sx=bx+10*s+Math.cos(-Math.PI/3+sw)*i*s*1.5;const sy=by+10*s+Math.sin(-Math.PI/3+sw)*i*s*1.5;ctx.fillStyle=i<2?'#886622':'#aabbcc';ctx.fillRect(sx,sy,s,s)}
    }else{
      for(let i=0;i<5;i++){ctx.fillStyle=i<1?'#886622':'#aabbcc';ctx.fillRect(bx+10*s,by+(9+i*1.5)*s,s,s)}
    }
  },
  
  eGoblin(ctx,bx,by,s,action,frame,total){
    const p=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(bx+x*s,by+y*s,s,s)};
    const skin='#88aa44',skinD='#668833',cloth='#885533',clothD='#663322';
    const lo=action==='walk'?Math.sin(frame/total*Math.PI*2)*2:0;
    
    p(5,17+lo,cloth);p(5,18+lo,skinD);p(8,17-lo,cloth);p(8,18-lo,skinD);
    for(let i=0;i<4;i++){p(4+i,10,cloth);p(4+i,11,clothD);p(4+i,12,cloth);p(4+i,13,clothD);p(4+i,14,cloth)}
    for(let i=0;i<4;i++){p(4+i,2,skin);p(4+i,3,skin);p(4+i,4,skin);p(4+i,5,skinD);p(4+i,6,skin);p(4+i,7,skinD)}
    // Big ears
    p(2,3,skin);p(2,4,skinD);p(9,3,skin);p(9,4,skinD);
    // Eyes
    ctx.fillStyle='#ff0';ctx.fillRect(bx+4.3*s,by+3.5*s,s*0.8,s*0.8);ctx.fillRect(bx+6.8*s,by+3.5*s,s*0.8,s*0.8);
    ctx.fillStyle='#200';ctx.fillRect(bx+4.8*s,by+4*s,s*0.4,s*0.4);ctx.fillRect(bx+7.2*s,by+4*s,s*0.4,s*0.4);
    
    if(action==='attack'){const sw=frame/total;for(let i=0;i<4;i++){ctx.fillStyle=i<1?'#654':'#bbb';ctx.fillRect(bx+(10+sw*4)*s,by+(7+i*1.5-sw*3)*s,s,s)}}
  },
  
  eOrc(ctx,bx,by,s,action,frame,total){
    const p=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(bx+x*s,by+y*s,s,s)};
    const skin='#557744',skinD='#3a5530',armor='#665544',armorD='#443322';
    const lo=action==='walk'?Math.sin(frame/total*Math.PI*2)*1.5:0;
    
    // Bigger body
    p(4,18+lo,armorD);p(4,19+lo,skinD);p(9,18-lo,armorD);p(9,19-lo,skinD);
    for(let i=0;i<6;i++){p(3+i,9,armor);p(3+i,10,armorD);p(3+i,11,armor);p(3+i,12,armorD);p(3+i,13,armor);p(3+i,14,armorD);p(3+i,15,armor);p(3+i,16,armorD)}
    // Shoulder spikes
    p(2,8,armorD);p(2,9,armor);p(10,8,armorD);p(10,9,armor);
    
    for(let i=0;i<4;i++){p(4+i,2,skin);p(4+i,3,skin);p(4+i,4,skin);p(4+i,5,skinD);p(4+i,6,skin);p(4+i,7,skinD)}
    p(3,3,skin);p(8,3,skinD);
    // Tusks
    p(4,6,'#eee');p(7,6,'#eee');
    // Eyes
    ctx.fillStyle='#f44';ctx.fillRect(bx+4.5*s,by+3.5*s,s*0.7,s*0.7);ctx.fillRect(bx+6.8*s,by+3.5*s,s*0.7,s*0.7);
    
    // Big axe
    if(action==='attack'){
      const sw=frame/total*Math.PI;
      for(let i=0;i<5;i++){ctx.fillStyle='#654';ctx.fillRect(bx+10*s+Math.cos(-Math.PI/3+sw)*i*s*2,by+8*s+Math.sin(-Math.PI/3+sw)*i*s*2,s*1.5,s*1.5)}
      ctx.fillStyle='#999';
      const ax=bx+10*s+Math.cos(-Math.PI/3+sw)*5*s*2;
      const ay=by+8*s+Math.sin(-Math.PI/3+sw)*5*s*2;
      ctx.fillRect(ax-s,ay-s*2,s*3,s*4);
    }else{
      for(let i=0;i<4;i++){ctx.fillStyle='#654';ctx.fillRect(bx+10*s,by+(8+i*2)*s,s,s*1.5)}
      ctx.fillStyle='#999';ctx.fillRect(bx+9*s,by+15*s,s*3,s*3);
    }
  },
  
  eDemon(ctx,bx,by,s,action,frame,total){
    const p=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(bx+x*s,by+y*s,s,s)};
    const skin='#442244',skinD='#331133',skinL='#663366';
    const lo=action==='walk'?Math.sin(frame/total*Math.PI*2)*1:0;
    
    // Dark aura
    ctx.fillStyle='rgba(80,0,80,0.12)';
    ctx.beginPath();ctx.ellipse(bx+6*s,by+10*s,20,22,0,0,Math.PI*2);ctx.fill();
    
    // Wings
    const wf=Math.sin(frame/total*Math.PI*2)*4;
    ctx.fillStyle='rgba(60,0,60,0.6)';
    ctx.beginPath();ctx.moveTo(bx+2*s,by+8*s);ctx.lineTo(bx-2*s,by+(5-wf)*s);ctx.lineTo(bx+4*s,by+10*s);ctx.fill();
    ctx.beginPath();ctx.moveTo(bx+10*s,by+8*s);ctx.lineTo(bx+14*s,by+(5-wf)*s);ctx.lineTo(bx+8*s,by+10*s);ctx.fill();
    
    p(5,18+lo,skinD);p(5,19+lo,'#111');p(8,18-lo,skinD);p(8,19-lo,'#111');
    for(let i=0;i<5;i++){p(4+i,9,skinL);p(4+i,10,skin);p(4+i,11,skinD);p(4+i,12,skin);p(4+i,13,skinD);p(4+i,14,skin);p(4+i,15,skinD);p(4+i,16,skin)}
    for(let i=0;i<4;i++){p(4+i,2,skin);p(4+i,3,skin);p(4+i,4,skinL);p(4+i,5,skin);p(4+i,6,skinD);p(4+i,7,skin)}
    // Horns
    p(4,1,'#444');p(3,0,'#555');p(7,1,'#444');p(8,0,'#555');
    // Eyes
    ctx.fillStyle='#f0f';ctx.fillRect(bx+4.5*s,by+4*s,s*0.7,s*0.7);ctx.fillRect(bx+6.8*s,by+4*s,s*0.7,s*0.7);
    // Glow
    ctx.fillStyle='rgba(255,0,255,0.15)';
    ctx.beginPath();ctx.arc(bx+5*s,by+4.3*s,s*1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+7.2*s,by+4.3*s,s*1.5,0,Math.PI*2);ctx.fill();
    
    // Dark magic attack
    if(action==='attack'){
      const t=frame/total;
      for(let i=0;i<8;i++){
        const a=t*Math.PI*3+i*Math.PI/4;
        const r=5+t*20;
        ctx.fillStyle=`rgba(200,0,200,${0.4-t*0.3})`;
        ctx.beginPath();ctx.arc(bx+6*s+Math.cos(a)*r,by+10*s+Math.sin(a)*r,2+t*2,0,Math.PI*2);ctx.fill();
      }
    }
  },
  
  eDragon(ctx,cx,cy,s,action,frame,total){
    const bx=cx-18,by=cy-28;
    const bob=Math.sin(frame/total*Math.PI*2)*2;
    const sc='#882222',scD='#661111',scL='#aa4444',belly='#cc9944';
    const p=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(bx+x,by+y+bob,s,s)};
    
    // Wings
    const wf=Math.sin(frame/total*Math.PI*2)*5;
    ctx.fillStyle='rgba(120,20,20,0.5)';
    ctx.beginPath();ctx.moveTo(bx+4,by+10+bob);ctx.lineTo(bx-8,by+2+bob-wf);ctx.lineTo(bx-4,by+16+bob);ctx.lineTo(bx+8,by+14+bob);ctx.fill();
    ctx.beginPath();ctx.moveTo(bx+32,by+10+bob);ctx.lineTo(bx+44,by+2+bob-wf);ctx.lineTo(bx+40,by+16+bob);ctx.lineTo(bx+28,by+14+bob);ctx.fill();
    
    // Tail
    for(let i=0;i<5;i++){const tw=Math.sin(frame*0.5+i*0.3)*2;ctx.fillStyle=i%2?scD:sc;ctx.fillRect(bx+4+i*2,by+28+i*2+bob+tw,3,3)}
    
    // Legs
    ctx.fillStyle=scD;ctx.fillRect(bx+10,by+28+bob,4,6);ctx.fillRect(bx+24,by+28+bob,4,6);
    ctx.fillStyle='#333';ctx.fillRect(bx+9,by+33+bob,6,2);ctx.fillRect(bx+23,by+33+bob,6,2);
    
    // Body
    const bodyGrd=ctx.createRadialGradient(cx,cy+bob,4,cx,cy+bob,16);
    bodyGrd.addColorStop(0,belly);bodyGrd.addColorStop(0.5,sc);bodyGrd.addColorStop(1,scD);
    ctx.fillStyle=bodyGrd;
    ctx.beginPath();
    ctx.ellipse(cx,cy-2+bob,14,10,0,0,Math.PI*2);ctx.fill();
    
    // Belly detail
    ctx.fillStyle=belly;
    ctx.beginPath();ctx.ellipse(cx,cy+bob,6,7,0,0,Math.PI*2);ctx.fill();
    
    // Neck
    ctx.fillStyle=sc;ctx.fillRect(bx+14,by+8+bob,8,8);
    
    // Head
    ctx.fillStyle=scL;
    ctx.beginPath();ctx.ellipse(cx,by+6+bob,8,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=sc;
    ctx.beginPath();ctx.ellipse(cx,by+7+bob,7,4,0,0,Math.PI*2);ctx.fill();
    
    // Horns
    ctx.fillStyle='#777';
    ctx.fillRect(bx+12,by+bob,2,5);ctx.fillRect(bx+22,by+bob,2,5);
    ctx.fillStyle='#999';
    ctx.fillRect(bx+12,by-2+bob,2,3);ctx.fillRect(bx+22,by-2+bob,2,3);
    
    // Eyes
    ctx.fillStyle='#ff0';
    ctx.beginPath();ctx.arc(cx-4,by+5+bob,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+4,by+5+bob,2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(cx-3.5,by+5.5+bob,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+4.5,by+5.5+bob,1,0,Math.PI*2);ctx.fill();
    
    // Spines
    for(let i=0;i<4;i++){ctx.fillStyle='#aa5555';ctx.fillRect(bx+12+i*4,by+10+bob-2,2,3)}
    
    // Fire breath
    if(action==='attack'&&frame>=1){
      const fl=frame*5;
      for(let i=0;i<fl;i++){
        const fx=cx+6+i*2+Math.sin(i+frame)*2;
        const fy=by+7+bob+Math.sin(i*0.8+frame)*3;
        const size=3-i/fl*2;
        ctx.fillStyle=i<fl*0.3?'#ff4':(i<fl*0.6?'#f84':'#f44');
        ctx.beginPath();ctx.arc(fx,fy,Math.max(1,size),0,Math.PI*2);ctx.fill();
      }
    }
  }
};

// GAME STATE

let player=null,enemies=[],projectiles=[],particles=[],pickups=[];
let dungeon={floor:1,room:0,rooms:[],cleared:false};
let selectedClass='warrior';

// ===============================
// PLAYER
// ===============================
function createPlayer(classId){
  const c=CLASSES[classId];
  return{
    classId,x:0,y:0,vx:0,vy:0,
    hp:c.hp,maxHp:c.hp,mp:c.mp,maxMp:c.mp,
    atk:c.atk,def:c.def,spd:c.spd,critRate:c.critRate,
    atkRange:c.atkRange,
    level:1,exp:0,expNext:30,gold:0,keys:0,kills:0,
    dir:'down',action:'idle',frame:0,fTimer:0,
    attacking:false,atkTimer:0,atkCD:0,
    dashing:false,dashTimer:0,dashCD:0,dashDir:{x:0,y:0},
    invincible:false,invTimer:0,
    skillCDs:[0,0,0],
    buffs:[],
    inventory:[],
    stepTimer:0,
    
    update(dt){
      // Timers
      if(this.atkCD>0)this.atkCD-=dt;
      if(this.dashCD>0)this.dashCD-=dt;
      if(this.invincible){this.invTimer-=dt;if(this.invTimer<=0)this.invincible=false}
      for(let i=0;i<3;i++)if(this.skillCDs[i]>0)this.skillCDs[i]-=dt;
      this.mp=Math.min(this.maxMp,this.mp+3*dt);
      
      // Buffs
      this.buffs=this.buffs.filter(b=>{b.t-=dt;return b.t>0});
      
      // Movement
      if(!this.attacking&&!this.dashing){
        const mv=input.getMove();
        const spd=this.getSpd();
        this.vx=mv.x*spd;this.vy=mv.y*spd;
        if(Math.abs(mv.x)>0.3||Math.abs(mv.y)>0.3){
          if(Math.abs(mv.x)>Math.abs(mv.y))this.dir=mv.x>0?'right':'left';
          else this.dir=mv.y>0?'down':'up';
          this.action='walk';
          this.stepTimer-=dt;
          if(this.stepTimer<=0){Audio.step();this.stepTimer=0.3}
        }else{this.vx=0;this.vy=0;this.action='idle';this.stepTimer=0}
      }
      
      if(this.dashing){this.dashTimer-=dt;if(this.dashTimer<=0){this.dashing=false;this.invincible=false}}
      if(this.attacking){this.atkTimer-=dt;if(this.atkTimer<=0){this.attacking=false;this.action='idle'}}
      
      // Apply movement with collision
      const nx=this.x+this.vx*dt,ny=this.y+this.vy*dt;
      const room=getCurrentRoom();
      if(room){
        if(nx>24&&nx<room.w*32-24)this.x=nx;
        if(ny>24&&ny<room.h*32-24)this.y=ny;
        // Wall collision
        for(let wy=0;wy<room.h;wy++)for(let wx=0;wx<room.w;wx++){
          if(room.tiles[wy]?.[wx]===1){
            const wx1=wx*32,wy1=wy*32;
            if(this.x>wx1-12&&this.x<wx1+44&&this.y>wy1-8&&this.y<wy1+40){
              // Push out
              const dx=this.x-(wx1+16),dy=this.y-(wy1+16);
              if(Math.abs(dx)>Math.abs(dy)){this.x=dx>0?wx1+44:wx1-12}
              else{this.y=dy>0?wy1+40:wy1-8}
            }
          }
        }
      }
      
      // Animation
      this.fTimer+=dt;
      const fSpd=this.action==='attack'?0.08:0.12;
      if(this.fTimer>=fSpd){this.fTimer=0;this.frame++}
      
      // Pickup collision
      pickups=pickups.filter(pk=>{
        const d=Math.hypot(pk.x-this.x,pk.y-this.y);
        if(d<20){
          if(pk.type==='gold'){this.gold+=pk.val;Audio.coin();floatText(pk.x,pk.y-10,'+'+pk.val,'#fbbf24')}
          else if(pk.type==='hp'){this.hp=Math.min(this.maxHp,this.hp+pk.val);Audio.pickup();floatText(pk.x,pk.y-10,'+'+pk.val,'#4ade80','heal')}
          else if(pk.type==='mp'){this.mp=Math.min(this.maxMp,this.mp+pk.val);Audio.pickup();floatText(pk.x,pk.y-10,'+'+pk.val,'#60a5fa','heal')}
          else if(pk.type==='key'){this.keys++;Audio.pickup();notify('🔑 Nhận được chìa khóa!')}
          return false;
        }
        return true;
      });
    },
    
    getAtk(){let a=this.atk;this.buffs.forEach(b=>{if(b.atkMul)a*=(1+b.atkMul)});return Math.floor(a)},
    getSpd(){return this.spd},
    
    render(ctx){
      const total=this.action==='attack'?5:this.action==='walk'?6:4;
      const f=this.frame%total;
      
      ctx.save();
      if(this.invincible&&Math.floor(Date.now()/80)%2===0)ctx.globalAlpha=0.4;
      
      // Dash trail
      if(this.dashing){
        ctx.globalAlpha=0.2;Pix.drawChar(ctx,this.x-this.vx*0.04,this.y-this.vy*0.04,this.classId,this.dir,this.action,f,total);
        ctx.globalAlpha=0.1;Pix.drawChar(ctx,this.x-this.vx*0.08,this.y-this.vy*0.08,this.classId,this.dir,this.action,f,total);
        ctx.globalAlpha=this.invincible&&Math.floor(Date.now()/80)%2===0?0.4:1;
      }
      
      Pix.drawChar(ctx,this.x,this.y,this.classId,this.dir,this.action,f,total);
      ctx.restore();
    },
    
    attack(){
      if(this.attacking||this.atkCD>0||this.dashing)return;
      this.attacking=true;this.atkTimer=0.35;this.atkCD=0.12;
      this.action='attack';this.frame=0;this.vx*=0.2;this.vy*=0.2;
      Audio.slash();
      
      const off=dirOffset(this.dir,18);
      const ax=this.x+off.x,ay=this.y+off.y;
      let hit=false;
      
      enemies.forEach(e=>{
        if(!e.alive)return;
        if(Math.hypot(e.x-ax,e.y-ay)<this.atkRange){
          let dmg=this.getAtk()+Math.floor(Math.random()*4);
          const crit=Math.random()*100<this.critRate;
          if(crit)dmg=Math.floor(dmg*1.8);
          e.takeDamage(dmg,crit);hit=true;
          setTimeout(()=>crit?Audio.crit():Audio.hit(),60);
        }
      });
      
      emitParticles(ax,ay,6,'rgba(200,220,255,0.7)',0.25);
      if(hit)shake(3,0.1);
    },
    
    useSkill(idx){
      if(this.attacking||this.dashing)return;
      const sk=CLASSES[this.classId].skills[idx];
      if(!sk||this.skillCDs[idx]>0||this.mp<sk.mp)return;
      
      this.mp-=sk.mp;this.skillCDs[idx]=sk.cd;
      Audio[sk.sfx]?.();
      
      const off=dirOffset(this.dir,20);
      
      if(sk.type==='aoe'){
        enemies.forEach(e=>{if(e.alive&&Math.hypot(e.x-this.x,e.y-this.y)<sk.range)
          e.takeDamage(Math.floor(this.getAtk()*sk.dmgMul))});
        emitParticles(this.x,this.y,25,sk.icon==='❄️'?'#88ddff':'#ff8844',0.6);
        shake(5,0.15);flash('rgba(168,85,247,0.3)',120);
      }
      else if(sk.type==='dash_attack'){
        const tx=this.x+off.x*3,ty=this.y+off.y*3;
        enemies.forEach(e=>{if(e.alive&&Math.hypot(e.x-this.x,e.y-this.y)<sk.range)
          e.takeDamage(Math.floor(this.getAtk()*sk.dmgMul))});
        this.x=tx;this.y=ty;
        emitParticles(this.x,this.y,15,'#ef4444',0.4);
        shake(6,0.2);flash('rgba(239,68,68,0.3)',150);
      }
      else if(sk.type==='buff'){
        this.buffs.push({atkMul:sk.buffAtk,t:sk.duration});
        emitParticles(this.x,this.y,20,'#fbbf24',0.8);
        notify('⚔️ Sức mạnh tăng!');flash('rgba(251,191,36,0.3)',150);
      }
      else if(sk.type==='projectile'){
        const o=dirOffset(this.dir,1);
        projectiles.push({x:this.x+off.x,y:this.y+off.y,vx:o.x*200,vy:o.y*200,dmg:Math.floor(this.getAtk()*sk.dmgMul),life:1,r:6,color:'#ff6622',friendly:true,pierce:false});
        emitParticles(this.x+off.x,this.y+off.y,8,'#ff4422',0.3);
      }
      else if(sk.type==='multi_proj'){
        const o=dirOffset(this.dir,1);
        for(let i=0;i<sk.count;i++){
          const spread=(i-Math.floor(sk.count/2))*0.3;
          const vx=o.x*220+spread*80*(Math.abs(o.y)>0.5?1:0);
          const vy=o.y*220+spread*80*(Math.abs(o.x)>0.5?1:0);
          setTimeout(()=>{projectiles.push({x:this.x+off.x,y:this.y+off.y,vx,vy,dmg:Math.floor(this.getAtk()*sk.dmgMul),life:0.8,r:3,color:'#ccaa44',friendly:true})},i*50);
        }
      }
      else if(sk.type==='pierce_proj'){
        const o=dirOffset(this.dir,1);
        projectiles.push({x:this.x+off.x,y:this.y+off.y,vx:o.x*300,vy:o.y*300,dmg:Math.floor(this.getAtk()*sk.dmgMul),life:1.2,r:4,color:'#44ffaa',friendly:true,pierce:true});
        shake(3,0.1);
      }
      else if(sk.type==='heal'){
        const heal=Math.floor(this.maxHp*sk.healPct);
        this.hp=Math.min(this.maxHp,this.hp+heal);
        floatText(this.x,this.y-30,'+'+heal,'#4ade80','heal');
        emitParticles(this.x,this.y,15,'#4ade80',0.6);
      }
      else if(sk.type==='backflip'){
        const o=dirOffset(this.dir,-1);
        this.x+=o.x*50;this.y+=o.y*50;
        const fo=dirOffset(this.dir,1);
        projectiles.push({x:this.x,y:this.y,vx:fo.x*250,vy:fo.y*250,dmg:Math.floor(this.getAtk()*sk.dmgMul),life:0.6,r:4,color:'#aaddff',friendly:true});
        emitParticles(this.x,this.y,10,'rgba(255,255,255,0.5)',0.3);
      }
    },
    
    dodge(){
      if(this.dashing||this.dashCD>0)return;
      this.dashing=true;this.dashTimer=0.25;this.dashCD=0.8;
      this.invincible=true;this.invTimer=0.25;
      const off=dirOffset(this.dir,1);
      this.vx=off.x*280;this.vy=off.y*280;
      emitParticles(this.x,this.y,8,'rgba(255,255,255,0.4)',0.25);
      Audio.dash();
    },
    
    takeDamage(amt){
      if(this.invincible||this.dashing)return;
      const dmg=Math.max(1,amt-this.def);
      this.hp-=dmg;
      floatText(this.x,this.y-30,dmg,'#ef4444');
      shake(4,0.12);flash('rgba(255,0,0,0.2)',80);
      this.invincible=true;this.invTimer=0.4;
      Audio.hurt();
      if(this.hp<=0){this.hp=0;playerDie()}
    },
    
    gainExp(amt){
      this.exp+=amt;
      while(this.exp>=this.expNext){this.exp-=this.expNext;this.levelUp()}
    },
    
    levelUp(){
      this.level++;
      this.maxHp+=12;this.maxMp+=6;this.atk+=2;this.def+=1;this.spd+=3;
      this.hp=this.maxHp;this.mp=this.maxMp;
      this.expNext=Math.floor(this.expNext*1.35);
      notify('⬆️ Lên cấp '+this.level+'!');
      flash('rgba(251,191,36,0.4)',250);
      emitParticles(this.x,this.y,30,'#fbbf24',1);
      Audio.levelUp();
    }
  };
}

// ===============================
// DUNGEON GENERATION
// ===============================
function generateFloor(floor){
  const roomCount=5+Math.floor(floor*1.5);
  const rooms=[];
  
  for(let i=0;i<roomCount;i++){
    const w=10+Math.floor(Math.random()*6);
    const h=8+Math.floor(Math.random()*4);
    const type=i===0?'start':i===roomCount-1?'boss':(Math.random()<0.2?'treasure':'combat');
    
    const room={w,h,type,tiles:[],enemies:[],cleared:type==='start',
      exits:i<roomCount-1?['right']:[],
      entered:i===0};
    
    // Generate tiles
    for(let y=0;y<h;y++){
      room.tiles[y]=[];
      for(let x=0;x<w;x++){
        if(x===0||x===w-1||y===0||y===h-1)room.tiles[y][x]=1;
        else room.tiles[y][x]=Math.random()<0.05?1:0;
      }
    }
    
    // Open exits
    if(room.exits.includes('right')){
      const my=Math.floor(h/2);
      room.tiles[my][w-1]=2;// door
      room.tiles[my-1]&&(room.tiles[my-1][w-1]=2);
    }
    if(i>0){// left entrance
      const my=Math.floor(h/2);
      room.tiles[my][0]=2;
      room.tiles[my-1]&&(room.tiles[my-1][0]=2);
    }
    
    // Enemies
    if(type==='combat'){
      const eCount=2+Math.floor(Math.random()*3)+Math.floor(floor*0.5);
      const eTypes=['slime','slime','goblin','skeleton','goblin','orc'];
      if(floor>=3)eTypes.push('demon','orc');
      for(let e=0;e<eCount;e++){
        room.enemies.push({
          type:eTypes[Math.floor(Math.random()*Math.min(eTypes.length,2+floor))],
          x:64+Math.random()*(w*32-128),
          y:64+Math.random()*(h*32-128)
        });
      }
    }
    else if(type==='boss'){
      room.enemies.push({type:floor>=3?'dragon':'demon',x:w*16,y:h*16,boss:true});
      // Add minions
      for(let e=0;e<2;e++){
        room.enemies.push({type:'skeleton',x:w*16-60+e*120,y:h*16+40});
      }
    }
    
    rooms.push(room);
  }
  
  return rooms;
}

function getCurrentRoom(){return dungeon.rooms[dungeon.room]}

// ===============================
// ENEMIES
// ===============================
function spawnRoomEnemies(room){
  enemies=[];
  room.enemies.forEach(def=>{
    const stats=getEnemyStats(def.type,dungeon.floor);
    enemies.push({
      type:def.type,x:def.x,y:def.y,
      hp:stats.hp,maxHp:stats.hp,atk:stats.atk,def:stats.def,
      spd:stats.spd,exp:stats.exp,gold:stats.gold,
      alive:true,boss:def.boss||false,
      dir:'down',action:'idle',frame:0,fTimer:0,
      aiState:'idle',aiTimer:Math.random()*2,
      atkCD:0,aggroRange:stats.aggro,atkRange:stats.atkRange,
      hurtTimer:0,
      
      update(dt){
        if(!this.alive)return;
        if(this.hurtTimer>0)this.hurtTimer-=dt;
        if(this.atkCD>0)this.atkCD-=dt;
        this.fTimer+=dt;if(this.fTimer>=0.15){this.fTimer=0;this.frame++}
        
        const dp=Math.hypot(player.x-this.x,player.y-this.y);
        
        if(this.aiState==='idle'){
          this.action='idle';this.aiTimer-=dt;
          if(dp<this.aggroRange)this.aiState='chase';
          else if(this.aiTimer<=0){this.aiState='wander';this.aiTimer=1+Math.random()*2;
            this.wanderDir={x:Math.random()-0.5,y:Math.random()-0.5}}
        }
        else if(this.aiState==='wander'){
          this.aiTimer-=dt;
          if(this.aiTimer<=0||dp<this.aggroRange){this.aiState=dp<this.aggroRange?'chase':'idle';this.aiTimer=1+Math.random();return}
          const nx=this.x+this.wanderDir.x*this.spd*0.4*dt;
          const ny=this.y+this.wanderDir.y*this.spd*0.4*dt;
          const room=getCurrentRoom();
          if(nx>24&&nx<room.w*32-24)this.x=nx;
          if(ny>24&&ny<room.h*32-24)this.y=ny;
          this.action='walk';
          if(Math.abs(this.wanderDir.x)>Math.abs(this.wanderDir.y))this.dir=this.wanderDir.x>0?'right':'left';
          else this.dir=this.wanderDir.y>0?'down':'up';
        }
        else if(this.aiState==='chase'){
          if(dp>this.aggroRange*2.5){this.aiState='idle';this.aiTimer=1;return}
          if(dp<=this.atkRange){this.aiState='attack';return}
          const dx=player.x-this.x,dy=player.y-this.y;
          const d=Math.hypot(dx,dy);
          const nx=this.x+dx/d*this.spd*dt;
          const ny=this.y+dy/d*this.spd*dt;
          const room=getCurrentRoom();
          if(nx>24&&nx<room.w*32-24)this.x=nx;
          if(ny>24&&ny<room.h*32-24)this.y=ny;
          if(Math.abs(dx)>Math.abs(dy))this.dir=dx>0?'right':'left';
          else this.dir=dy>0?'down':'up';
          this.action='walk';
        }
        else if(this.aiState==='attack'){
          this.action='attack';
          if(this.atkCD<=0&&dp<=this.atkRange+10){
            player.takeDamage(this.atk);
            this.atkCD=this.boss?1.8:1.2;
            if(this.boss){shake(6,0.2);emitParticles(player.x,player.y,12,'#f44',0.3)}
          }
          if(dp>this.atkRange+30)this.aiState='chase';
        }
        
        // Boss bar
        if(this.boss&&dp<200){
          document.getElementById('bossBar').style.display='block';
          document.getElementById('bossName').textContent=getBossName(this.type);
          document.getElementById('bossBarFill').style.width=(this.hp/this.maxHp*100)+'%';
        }
      },
      
      render(ctx){
        if(!this.alive)return;
        const total=this.action==='attack'?4:4;
        ctx.save();
        if(this.hurtTimer>0&&Math.floor(this.hurtTimer*10)%2)ctx.globalAlpha=0.5;
        Pix.drawEnemy(ctx,this.x,this.y,this.type,this.dir,this.action,this.frame%total,total);
        ctx.restore();
        // HP bar
        if(this.hp<this.maxHp){
          const bw=this.boss?50:28;
          ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(this.x-bw/2,this.y-32,bw,4);
          ctx.fillStyle='#ef4444';ctx.fillRect(this.x-bw/2,this.y-32,bw*(this.hp/this.maxHp),4);
        }
      },
      
      takeDamage(dmg,crit){
        const d=Math.max(1,dmg-this.def);
        this.hp-=d;this.hurtTimer=0.25;
        floatText(this.x,this.y-30,d,crit?'#fbbf24':'#fff',crit?'crit':'');
        if(crit){emitParticles(this.x,this.y-8,8,'#fbbf24',0.3);shake(3,0.08)}
        Audio.enemyHurt?.()|| Audio.hit();
        // Knockback
        const dx=this.x-player.x,dy=this.y-player.y,dist=Math.hypot(dx,dy);
        if(dist>0){const room=getCurrentRoom();const nx=this.x+dx/dist*12;const ny=this.y+dy/dist*12;
          if(nx>24&&nx<room.w*32-24)this.x=nx;if(ny>24&&ny<room.h*32-24)this.y=ny}
        if(this.aiState!=='chase'&&this.aiState!=='attack')this.aiState='chase';
        if(this.hp<=0)this.die();
      },
      
      die(){
        this.alive=false;
        player.gainExp(this.exp);
        player.gold+=this.gold;player.kills++;
        // Drops
        pickups.push({x:this.x,y:this.y,type:'gold',val:this.gold,life:15});
        if(Math.random()<0.25)pickups.push({x:this.x+10,y:this.y,type:'hp',val:15+dungeon.floor*5,life:15});
        if(Math.random()<0.1)pickups.push({x:this.x-10,y:this.y,type:'mp',val:10,life:15});
        
        emitParticles(this.x,this.y,18,'#fbbf24',0.5);
        floatText(this.x,this.y-45,'+'+this.exp+' EXP','#fbbf24');
        
        if(this.boss){
          document.getElementById('bossBar').style.display='none';
          shake(12,0.5);flash('rgba(255,255,255,0.5)',250);
          notify('🎉 Boss bị tiêu diệt!');
          emitParticles(this.x,this.y,50,'#fbbf24',1.2);
          Audio.bossDie();
        }else{Audio.enemyDie()}
        
        checkRoomClear();
      }
    });
  });
}

function getEnemyStats(type,floor){
  const mul=1+floor*0.25;
  const base={
    slime:{hp:25,atk:4,def:1,spd:28,exp:8,gold:4,aggro:80,atkRange:22},
    goblin:{hp:40,atk:8,def:2,spd:55,exp:15,gold:8,aggro:95,atkRange:26},
    skeleton:{hp:60,atk:12,def:4,spd:40,exp:25,gold:15,aggro:100,atkRange:32},
    orc:{hp:100,atk:18,def:7,spd:35,exp:40,gold:25,aggro:110,atkRange:36},
    demon:{hp:250,atk:28,def:10,spd:45,exp:120,gold:60,aggro:130,atkRange:40},
    dragon:{hp:500,atk:40,def:15,spd:38,exp:300,gold:150,aggro:160,atkRange:50}
  };
  const b=base[type]||base.slime;
  return{hp:Math.floor(b.hp*mul),atk:Math.floor(b.atk*mul),def:Math.floor(b.def*mul),
    spd:b.spd,exp:Math.floor(b.exp*mul),gold:Math.floor(b.gold*mul),
    aggro:b.aggro,atkRange:b.atkRange};
}

function getBossName(type){
  return{demon:'Ma Vương Ám Ảnh',dragon:'Rồng Cổ Đại Vexar',orc:'Chúa Tể Orc'}[type]||'Boss'}

function checkRoomClear(){
  if(enemies.every(e=>!e.alive)&&!getCurrentRoom().cleared){
    getCurrentRoom().cleared=true;
    showBanner('PHÒNG ĐÃ DỌN SẠCH','Đi tiếp để tiến vào phòng kế');
    Audio.chest();
    // Drop rewards
    if(getCurrentRoom().type==='boss'){
      setTimeout(()=>showReward(dungeon.floor>=3?'legendary':'epic'),1000);
    }else if(getCurrentRoom().type==='treasure'){
      setTimeout(()=>showReward('rare'),500);
    }
  }
}

// ===============================
// ROOM RENDERING
// ===============================
function renderRoom(ctx){
  const room=getCurrentRoom();
  if(!room)return;
  
  const T=32;
  // Floor
  for(let y=0;y<room.h;y++)for(let x=0;x<room.w;x++){
    const px=x*T,py=y*T;
    const t=room.tiles[y][x];
    
    if(t===0){
      // Floor
      const floorBase=dungeon.floor<=2?'#3a3a4a':'#2a2a3a';
      const floorAlt=dungeon.floor<=2?'#353548':'#252538';
      ctx.fillStyle=(x+y)%2===0?floorBase:floorAlt;
      ctx.fillRect(px,py,T,T);
      // Floor details
      if((x*7+y*13)%11===0){ctx.fillStyle='rgba(255,255,255,0.03)';ctx.fillRect(px+4,py+4,4,4)}
      if((x*3+y*5)%9===0){ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(px+12,py+8,8,2)}
    }
    else if(t===1){
      // Wall
      const wallBase=dungeon.floor<=2?'#555566':'#444455';
      ctx.fillStyle=wallBase;ctx.fillRect(px,py,T,T);
      ctx.fillStyle='#666677';ctx.fillRect(px+2,py+2,T-4,T-4);
      // Brick pattern
      ctx.fillStyle='#555566';
      if(y%2===0){ctx.fillRect(px+T/2-1,py,2,T);ctx.fillRect(px,py+T/2-1,T,2)}
      else{ctx.fillRect(px,py+T/2-1,T,2)}
      // Top highlight
      if(y>0&&room.tiles[y-1]?.[x]===0){ctx.fillStyle='#777788';ctx.fillRect(px,py,T,3)}
    }
    else if(t===2){
      // Door
      ctx.fillStyle='#2a2a3a';ctx.fillRect(px,py,T,T);
      ctx.fillStyle='rgba(168,85,247,0.2)';ctx.fillRect(px+4,py+2,T-8,T-4);
      // Door glow animation
      const glow=Math.sin(Date.now()*0.003)*0.15+0.15;
      ctx.fillStyle=`rgba(168,85,247,${glow})`;ctx.fillRect(px+2,py,T-4,T);
    }
  }
  
  // Decorations
  if(room.type==='treasure'){
    // Draw chest in center if not cleared
    if(!room.cleared){
      const cx=room.w*16,cy=room.h*16;
      ctx.fillStyle='#886622';ctx.fillRect(cx-12,cy-8,24,16);
      ctx.fillStyle='#aa8833';ctx.fillRect(cx-10,cy-6,20,12);
      ctx.fillStyle='#fbbf24';ctx.fillRect(cx-2,cy-2,4,4);
      ctx.fillStyle='#665511';ctx.fillRect(cx-12,cy-1,24,2);
    }
  }
}

function dirOffset(dir,mag){
  switch(dir){
    case'up':return{x:0,y:-mag};case'down':return{x:0,y:mag};
    case'left':return{x:-mag,y:0};case'right':return{x:mag,y:0};
  }
}

function shake(i,d){cam.shake.i=i;cam.shake.t=d}
function flash(c,d){const e=document.getElementById('flash');e.style.background=c;e.style.opacity='0.3';setTimeout(()=>e.style.opacity='0',d||100)}

function floatText(x,y,text,color,cls){
  const el=document.createElement('div');el.className='ftext'+(cls?' '+cls:'');
  el.textContent=text;el.style.color=color||'#fff';
  el.style.fontSize=cls==='crit'?'18px':'13px';
  const sx=x-cam.x+canvas.width/2;const sy=y-cam.y+canvas.height/2;
  el.style.left=sx+'px';el.style.top=sy+'px';
  document.getElementById('U').appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function notify(text){
  const el=document.createElement('div');el.className='notif';el.textContent=text;
  document.getElementById('U').appendChild(el);
  setTimeout(()=>el.remove(),2500);
}

function showBanner(text,sub){
  const b=document.getElementById('banner');
  document.getElementById('banner-text').textContent=text;
  document.getElementById('banner-sub').textContent=sub||'';
  b.style.opacity='1';
  setTimeout(()=>b.style.opacity='0',2500);
}

function emitParticles(x,y,count,color,life){
  for(let i=0;i<count;i++)particles.push({
    x:x+(Math.random()-0.5)*10,y:y+(Math.random()-0.5)*10,
    vx:(Math.random()-0.5)*80,vy:(Math.random()-0.5)*80-20,
    size:1+Math.random()*3,color,life:life||0.5,maxLife:life||0.5
  });
}

function showReward(maxRarity){
  gameState='reward';
  const items=generateRewardItems(maxRarity);
  const el=document.getElementById('reward');
  el.style.display='flex';
  
  document.getElementById('reward')
  el.innerHTML=`
    <div id="reward-title">🎁 PHẦN THƯỞNG</div>
    <div id="reward-items">${items.map((it,i)=>`
      <div class="reward-item r${it.rarity[0].toUpperCase()}" onclick="pickReward(${i})">
        <span class="ri-icon">${it.icon}</span>
        <div class="ri-name" style="color:${rarityColor(it.rarity)}">${it.name}</div>
        <div class="ri-stat">${it.statText}</div>
      </div>`).join('')}</div>
    <div id="reward-btn" onclick="closeReward()">Tiếp Tục</div>`;
  
  window._rewardItems=items;
  Audio.chest();
}

function generateRewardItems(maxRarity){
  const pool=[
    {icon:'❤️',name:'Bình HP',type:'potion',rarity:'common',statText:'HP +30',effect:{hp:30}},
    {icon:'💙',name:'Bình MP',type:'potion',rarity:'common',statText:'MP +20',effect:{mp:20}},
    {icon:'💖',name:'Bình HP+',type:'potion',rarity:'rare',statText:'HP +80',effect:{hp:80}},
    {icon:'🗡️',name:'Kiếm Sắt',type:'weapon',rarity:'common',statText:'ATK +3',stats:{atk:3}},
    {icon:'⚔️',name:'Kiếm Thép',type:'weapon',rarity:'rare',statText:'ATK +8',stats:{atk:8}},
    {icon:'🔥',name:'Kiếm Lửa',type:'weapon',rarity:'epic',statText:'ATK +15 CRIT+5%',stats:{atk:15,critRate:5}},
    {icon:'🌑',name:'Kiếm Bóng Tối',type:'weapon',rarity:'legendary',statText:'ATK +25 CRIT+10%',stats:{atk:25,critRate:10}},
    {icon:'🥋',name:'Giáp Da',type:'armor',rarity:'common',statText:'DEF +2 HP+15',stats:{def:2,maxHp:15}},
    {icon:'🛡️',name:'Giáp Xích',type:'armor',rarity:'rare',statText:'DEF +6 HP+30',stats:{def:6,maxHp:30}},
    {icon:'🏰',name:'Giáp Kỵ Sĩ',type:'armor',rarity:'epic',statText:'DEF +12 HP+60',stats:{def:12,maxHp:60}},
    {icon:'👢',name:'Giày Tốc Độ',type:'accessory',rarity:'rare',statText:'SPD +20',stats:{spd:20}},
    {icon:'💍',name:'Nhẫn Bạo Kích',type:'accessory',rarity:'epic',statText:'CRIT +8%',stats:{critRate:8}},
  ];
  
  const rarityOrder={common:0,rare:1,epic:2,legendary:3};
  const maxR=rarityOrder[maxRarity]||1;
  const filtered=pool.filter(it=>rarityOrder[it.rarity]<=maxR);
  
  // Pick 3 random
  const result=[];
  const shuffled=[...filtered].sort(()=>Math.random()-0.5);
  for(let i=0;i<Math.min(3,shuffled.length);i++)result.push(shuffled[i]);
  return result;
}

function pickReward(idx){
  const item=window._rewardItems[idx];
  if(!item)return;
  
  if(item.type==='potion'){
    if(item.effect.hp)player.hp=Math.min(player.maxHp,player.hp+item.effect.hp);
    if(item.effect.mp)player.mp=Math.min(player.maxMp,player.mp+item.effect.mp);
    notify('Sử dụng '+item.name);
  }else{
    // Equip: add stats
    if(item.stats){Object.entries(item.stats).forEach(([k,v])=>player[k]+=v)}
    player.inventory.push(item);
    notify('Trang bị: '+item.name);
  }
  Audio.pickup();
  
  // Mark as picked
  const els=document.querySelectorAll('.reward-item');
  els.forEach((e,i)=>{if(i===idx)e.style.opacity='0.3'});
}

function closeReward(){
  document.getElementById('reward').style.display='none';
  gameState='playing';
}

function rarityColor(r){return{common:'#ccc',rare:'#3b82f6',epic:'#a855f7',legendary:'#fbbf24'}[r]||'#ccc'}

const input={
  joystick:{x:0,y:0,active:false},
  keys:{},
  getMove(){
    let x=this.joystick.x,y=this.joystick.y;
    if(this.keys.a||this.keys.arrowleft)x=-1;
    if(this.keys.d||this.keys.arrowright)x=1;
    if(this.keys.w||this.keys.arrowup)y=-1;
    if(this.keys.s||this.keys.arrowdown)y=1;
    return{x,y};
  }
};

function setupInput(){
  const jz=document.getElementById('jZone'),jt=document.getElementById('jThumb');
  let ja=false;const jc={x:65,y:65},jr=40;
  
  const hj=(cx,cy)=>{
    const r=jz.getBoundingClientRect();
    const dx=cx-r.left-jc.x,dy=cy-r.top-jc.y;
    const d=Math.min(Math.hypot(dx,dy),jr);
    const a=Math.atan2(dy,dx);
    jt.style.left=(jc.x-24+Math.cos(a)*d)+'px';
    jt.style.top=(jc.y-24+Math.sin(a)*d)+'px';
    input.joystick.x=Math.cos(a)*d/jr;
    input.joystick.y=Math.sin(a)*d/jr;
    input.joystick.active=true;
  };
  
  jz.addEventListener('touchstart',e=>{e.preventDefault();ja=true;hj(e.touches[0].clientX,e.touches[0].clientY)});
  jz.addEventListener('touchmove',e=>{e.preventDefault();if(ja)hj(e.touches[0].clientX,e.touches[0].clientY)});
  jz.addEventListener('touchend',e=>{e.preventDefault();ja=false;jt.style.left='41px';jt.style.top='41px';input.joystick.x=0;input.joystick.y=0;input.joystick.active=false});
  
  const btn=(id,fn)=>{const e=document.getElementById(id);
    e?.addEventListener('touchstart',ev=>{ev.preventDefault();fn()});
    e?.addEventListener('mousedown',ev=>{ev.preventDefault();fn()})};
  
  btn('btnAtk',()=>{if(gameState==='playing')player?.attack()});
  btn('btnDash',()=>{if(gameState==='playing')player?.dodge()});
  btn('btnInteract',()=>{if(gameState==='playing')tryInteract()});
  
  document.addEventListener('keydown',e=>{
    input.keys[e.key.toLowerCase()]=true;
    if(e.key===' ')player?.attack();
    if(e.key==='Shift')player?.dodge();
    if(e.key==='q')player?.useSkill(0);
    if(e.key==='e')player?.useSkill(1);
    if(e.key==='r')player?.useSkill(2);
    if(e.key==='f')tryInteract();
    if(e.key==='Escape')togglePause();
  });
  document.addEventListener('keyup',e=>input.keys[e.key.toLowerCase()]=false);
  
  document.addEventListener('touchstart',()=>Audio.resume(),{once:true});
  document.addEventListener('click',()=>Audio.resume(),{once:true});
}

function tryInteract(){
  const room=getCurrentRoom();
  if(!room||!room.cleared)return;
  
  // Check if near exit
  const px=Math.floor(player.x/32),py=Math.floor(player.y/32);
  if(room.tiles[py]?.[px]===2||room.tiles[py]?.[px-1]===2||room.tiles[py]?.[px+1]===2){
    // Go to next room
    if(dungeon.room<dungeon.rooms.length-1){
      dungeon.room++;
      enterRoom();
    }else{
      // Floor complete!
      dungeon.floor++;dungeon.room=0;
      dungeon.rooms=generateFloor(dungeon.floor);
      enterRoom();
      notify('🏆 Tầng '+dungeon.floor+'!');
      Audio.portal();
    }
  }
}

function enterRoom(){
  const room=getCurrentRoom();
  room.entered=true;
  player.x=64;player.y=room.h*16;
  spawnRoomEnemies(room);
  projectiles=[];pickups=[];
  
  const names={start:'Phòng Bắt Đầu',combat:'Phòng Chiến Đấu',treasure:'Phòng Kho Báu',boss:'Phòng Boss'};
  showBanner(names[room.type]||'Phòng',`Tầng ${dungeon.floor} · Phòng ${dungeon.room+1}`);
  document.getElementById('room-display').textContent=`Tầng ${dungeon.floor} · Phòng ${dungeon.room+1}`;
  
  if(room.type==='treasure'&&!room.cleared){
    // Treat as reward room
    setTimeout(()=>{room.cleared=true;showReward('rare')},500);
  }
}

function buyItem(idx){
  const it=shopItems[idx];
  if(player.gold<it.price){Audio.err();notify('Không đủ vàng!');return}
  player.gold-=it.price;
  if(it.effect){
    if(it.effect.hp)player.hp=Math.min(player.maxHp,player.hp+it.effect.hp);
    if(it.effect.mp)player.mp=Math.min(player.maxMp,player.mp+it.effect.mp);
  }
  if(it.stats){Object.entries(it.stats).forEach(([k,v])=>player[k]+=v);
    if(it.stats.maxHp)player.hp=Math.min(player.hp,player.maxHp)}
  Audio.buy();notify('Đã mua: '+it.name);
  showShopPanel(); // refresh
}

function setupTitle(){

  cs.innerHTML=Object.entries(CLASSES).map(([id,c])=>

    </div>`
  ).join('');
  
  document.getElementById('btnStart').onclick=startGame;
  
  // Title background particles
  const tc=document.getElementById('titleBg');
  tc.width=W();tc.height=H();
  const tctx=tc.getContext('2d');
  let titleParts=[];
  for(let i=0;i<50;i++)titleParts.push({x:Math.random()*W(),y:Math.random()*H(),s:Math.random()*2+0.5,sp:Math.random()*0.3+0.1});
  
  function drawTitleBg(){
    if(gameState!=='title')return;
    tctx.clearRect(0,0,W(),H());
    titleParts.forEach(p=>{
      p.y-=p.sp;if(p.y<0){p.y=H();p.x=Math.random()*W()}
      tctx.fillStyle=`rgba(168,85,247,${0.2+p.s*0.1})`;
      tctx.beginPath();tctx.arc(p.x,p.y,p.s,0,Math.PI*2);tctx.fill();
    });
    requestAnimationFrame(drawTitleBg);
  }
  drawTitleBg();
}

// ===============================
// GAME LOOP
// ===============================
function gameLoop(t){
  dt=Math.min((t-lastT)/1000,0.05);lastT=t;
  
  canvas.width=W();canvas.height=H();
  
  if(gameState==='playing'){
    // Update
    player.update(dt);
    enemies.forEach(e=>e.update(dt));
    
    // Projectiles
    projectiles=projectiles.filter(p=>{
      p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
      if(p.friendly){
        enemies.forEach(e=>{
          if(e.alive&&Math.hypot(e.x-p.x,e.y-p.y)<16){
            e.takeDamage(p.dmg);
            emitParticles(p.x,p.y,5,p.color,0.2);
            if(!p.pierce)p.life=0;
          }
        });
      }else{
        if(Math.hypot(player.x-p.x,player.y-p.y)<16){
          player.takeDamage(p.dmg);p.life=0;
        }
      }
      return p.life>0;
    });
    
    // Particles
    particles=particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=60*dt;p.life-=dt;return p.life>0});
    
    // Pickups
    pickups=pickups.filter(p=>{p.life-=dt;return p.life>0});
    
    // Camera
    cam.x+=(player.x-cam.x)*5*dt;
    cam.y+=(player.y-cam.y)*5*dt;
    const room=getCurrentRoom();
    if(room){
      cam.x=Math.max(W()/2,Math.min(room.w*32-W()/2,cam.x));
      cam.y=Math.max(H()/2,Math.min(room.h*32-H()/2,cam.y));
    }
    
    // Shake
    if(cam.shake.t>0){cam.shake.t-=dt;cam.shake.x=(Math.random()-0.5)*cam.shake.i;cam.shake.y=(Math.random()-0.5)*cam.shake.i}
    else{cam.shake.x=0;cam.shake.y=0}
    
    // UI
    updateHUD();
  }
  
  // Render
  if(gameState==='playing'||gameState==='paused'||gameState==='reward'){
    ctx.clearRect(0,0,W(),H());
    ctx.save();
    ctx.translate(-cam.x+W()/2+cam.shake.x,-cam.y+H()/2+cam.shake.y);
    
    renderRoom(ctx);
    
    // Sort and render entities
    const ents=[...enemies.filter(e=>e.alive),player,...pickups].sort((a,b)=>(a.y||0)-(b.y||0));
    ents.forEach(e=>{
      if(e.render)e.render(ctx);
      else if(e.type){// pickup
        ctx.fillStyle=e.type==='gold'?'#fbbf24':e.type==='hp'?'#ef4444':'#3b82f6';
        const bob=Math.sin(Date.now()*0.005+e.x)*3;
        ctx.beginPath();ctx.arc(e.x,e.y+bob-4,4,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.3)';
        ctx.beginPath();ctx.arc(e.x-1,e.y+bob-5,1.5,0,Math.PI*2);ctx.fill();
      }
    });
    
    // Projectiles
    projectiles.forEach(p=>{
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=p.color.replace(')',',0.3)').replace('rgb','rgba');
      ctx.beginPath();ctx.arc(p.x,p.y,p.r*2,0,Math.PI*2);ctx.fill();
    });
    
    // Particles
    particles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size)});
    ctx.globalAlpha=1;
    
    ctx.restore();
    
    // Minimap
    renderMinimap();
  }
  
  raf=requestAnimationFrame(gameLoop);
}

function updateHUD(){
  if(!player)return;
  document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';
  document.getElementById('mpFill').style.width=(player.mp/player.maxMp*100)+'%';
  document.getElementById('expFill').style.width=(player.exp/player.expNext*100)+'%';
  document.getElementById('hpText').textContent=Math.floor(player.hp)+'/'+player.maxHp;
  document.getElementById('mpText').textContent=Math.floor(player.mp)+'/'+player.maxMp;
  document.getElementById('portrait-lvl').textContent=player.level;
  document.getElementById('goldVal').textContent=player.gold;
  
  // Skill CDs
  for(let i=0;i<3;i++){
    const el=document.getElementById('skCD'+i);
    if(el){
      if(player.skillCDs[i]>0){el.style.display='flex';el.textContent=Math.ceil(player.skillCDs[i])}
      else el.style.display='none';
    }
  }
  
  // Interact button
  const room=getCurrentRoom();
  if(room?.cleared){
    const px=Math.floor(player.x/32),py=Math.floor(player.y/32);
    const nearDoor=room.tiles[py]?.[px]===2||room.tiles[py]?.[px+1]===2||room.tiles[py]?.[px-1]===2;
    document.getElementById('btnInteract').style.display=nearDoor?'flex':'none';
  }else{
    document.getElementById('btnInteract').style.display='none';
  }
}

function renderMinimap(){
  const mc=document.getElementById('mmCanvas');
  const mctx=mc.getContext('2d');
  mctx.fillStyle='#111';mctx.fillRect(0,0,80,80);
  
  // Draw rooms as blocks
  const totalRooms=dungeon.rooms.length;
  const blockW=Math.floor(70/totalRooms);
  
  dungeon.rooms.forEach((r,i)=>{
    const bx=5+i*blockW;
    const by=30;
    const bw=blockW-2;
    const bh=20;
    
    if(i===dungeon.room){
      mctx.fillStyle='#a855f7';mctx.fillRect(bx,by,bw,bh);
    }else if(r.entered){
      mctx.fillStyle=r.cleared?'#22c55e':'#ef4444';mctx.fillRect(bx,by,bw,bh);
    }else{
      mctx.fillStyle='#333';mctx.fillRect(bx,by,bw,bh);
    }
    mctx.strokeStyle='#555';mctx.strokeRect(bx,by,bw,bh);
    
    // Room type icon
    mctx.fillStyle='#fff';mctx.font='8px Arial';mctx.textAlign='center';
    const icons={start:'S',combat:'⚔',treasure:'💎',boss:'💀'};
    mctx.fillText(r.type==='boss'?'B':r.type==='treasure'?'T':r.type==='start'?'S':'',bx+bw/2,by+13);
  });
}
