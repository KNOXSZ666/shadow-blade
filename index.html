<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Shadow Blade Chronicle</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Segoe UI', Arial, sans-serif;
}

#gameContainer {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
}

#gameCanvas {
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

#uiLayer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#uiLayer > * {
  pointer-events: auto;
}

/* HP/MP Bars */
#statusBars {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
}

.bar-container {
  width: 180px;
  height: 18px;
  background: rgba(0,0,0,0.7);
  border: 2px solid #555;
  border-radius: 9px;
  margin-bottom: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 7px;
  transition: width 0.3s ease;
}

.bar-label {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  text-shadow: 1px 1px 2px #000;
}

#hpFill { background: linear-gradient(to right, #c0392b, #e74c3c, #ff6b6b); }
#mpFill { background: linear-gradient(to right, #2471a3, #3498db, #5dade2); }
#expFill { background: linear-gradient(to right, #d4ac0d, #f1c40f, #f9e547); }

.exp-container {
  width: 180px;
  height: 10px;
  background: rgba(0,0,0,0.7);
  border: 1px solid #555;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}

/* Level Badge */
#levelBadge {
  position: absolute;
  top: 10px;
  left: 200px;
  background: radial-gradient(circle, #f1c40f, #d4ac0d);
  color: #000;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 14px;
  border: 2px solid #fff;
  box-shadow: 0 0 10px rgba(241,196,15,0.5);
  z-index: 10;
}

/* Gold */
#goldDisplay {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  color: #f1c40f;
  padding: 5px 12px;
  border-radius: 15px;
  font-size: 13px;
  font-weight: bold;
  border: 1px solid #f1c40f;
  z-index: 10;
}

/* Minimap */
#minimap {
  position: absolute;
  top: 55px;
  right: 10px;
  width: 100px;
  height: 100px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 5px;
  overflow: hidden;
  z-index: 10;
}

#minimapCanvas {
  width: 100%;
  height: 100%;
  image-rendering: pixelated;
}

/* Joystick */
#joystickZone {
  position: absolute;
  bottom: 20px;
  left: 20px;
  width: 140px;
  height: 140px;
  z-index: 20;
}

#joystickBase {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
  border: 2px solid rgba(255,255,255,0.2);
  left: 10px;
  top: 10px;
}

#joystickThumb {
  position: absolute;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.5), rgba(255,255,255,0.2));
  border: 2px solid rgba(255,255,255,0.4);
  left: 45px;
  top: 45px;
  transition: none;
}

/* Action Buttons */
#actionButtons {
  position: absolute;
  bottom: 20px;
  right: 10px;
  z-index: 20;
}

.action-btn {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 2px #000;
  position: absolute;
  cursor: pointer;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.action-btn:active {
  transform: scale(0.9);
}

#btnAttack {
  background: radial-gradient(circle, rgba(231,76,60,0.8), rgba(192,57,43,0.6));
  bottom: 30px;
  right: 80px;
}

#btnSkill1 {
  background: radial-gradient(circle, rgba(52,152,219,0.8), rgba(41,128,185,0.6));
  bottom: 85px;
  right: 25px;
}

#btnSkill2 {
  background: radial-gradient(circle, rgba(155,89,182,0.8), rgba(142,68,173,0.6));
  bottom: 85px;
  right: 135px;
}

#btnDodge {
  background: radial-gradient(circle, rgba(46,204,113,0.8), rgba(39,174,96,0.6));
  bottom: 30px;
  right: 190px;
}

#btnJump {
  background: radial-gradient(circle, rgba(241,196,15,0.8), rgba(243,156,18,0.6));
  bottom: -15px;
  right: 25px;
}

/* Skill Cooldown */
.cooldown-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  display: none;
}

/* Dialog Box */
#dialogBox {
  position: absolute;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 500px;
  background: rgba(0,0,0,0.85);
  border: 2px solid #8B7355;
  border-radius: 10px;
  padding: 15px;
  color: #fff;
  font-size: 13px;
  line-height: 1.5;
  z-index: 30;
  display: none;
}

#dialogName {
  color: #f1c40f;
  font-weight: bold;
  font-size: 14px;
  margin-bottom: 5px;
}

#dialogText {
  min-height: 40px;
}

#dialogContinue {
  text-align: right;
  color: #aaa;
  font-size: 11px;
  margin-top: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

/* Menu Button */
#menuBtn {
  position: absolute;
  top: 55px;
  left: 10px;
  width: 35px;
  height: 35px;
  background: rgba(0,0,0,0.7);
  border: 1px solid #888;
  border-radius: 5px;
  color: #fff;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
  cursor: pointer;
}

/* Menu Panel */
#menuPanel {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  z-index: 50;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.menu-item {
  width: 200px;
  padding: 12px;
  margin: 5px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  color: #fff;
  text-align: center;
  font-size: 15px;
  cursor: pointer;
}

.menu-item:active {
  background: rgba(255,255,255,0.2);
}

/* Inventory Panel */
#inventoryPanel {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 50;
  display: none;
  flex-direction: column;
  padding: 20px;
}

#invTitle {
  color: #f1c40f;
  font-size: 20px;
  text-align: center;
  margin-bottom: 15px;
}

#invGrid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  max-width: 350px;
  margin: 0 auto;
}

.inv-slot {
  width: 60px;
  height: 60px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  position: relative;
}

.inv-slot.equipped {
  border-color: #f1c40f;
  background: rgba(241,196,15,0.1);
}

.inv-count {
  position: absolute;
  bottom: 2px;
  right: 4px;
  font-size: 10px;
  color: #fff;
}

#invClose {
  position: absolute;
  top: 15px;
  right: 15px;
  color: #fff;
  font-size: 24px;
  cursor: pointer;
}

/* Stats Panel */
#statsPanel {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 50;
  display: none;
  flex-direction: column;
  padding: 20px;
  color: #fff;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 15px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-size: 14px;
}

.stat-label { color: #aaa; }
.stat-value { color: #f1c40f; font-weight: bold; }

/* Quest Panel */
#questPanel {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 50;
  display: none;
  flex-direction: column;
  padding: 20px;
  color: #fff;
  overflow-y: auto;
}

.quest-item {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 8px;
}

.quest-title {
  color: #f1c40f;
  font-weight: bold;
  font-size: 14px;
}

.quest-desc {
  color: #ccc;
  font-size: 12px;
  margin-top: 4px;
}

.quest-progress {
  color: #2ecc71;
  font-size: 11px;
  margin-top: 4px;
}

/* Damage Numbers */
.damage-number {
  position: absolute;
  font-weight: bold;
  text-shadow: 1px 1px 2px #000, -1px -1px 2px #000;
  pointer-events: none;
  z-index: 15;
  animation: floatUp 0.8s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  50% { opacity: 1; transform: translateY(-30px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}

/* Title Screen */
#titleScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 50%, #0d0d1a 100%);
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

#gameTitle {
  font-size: 32px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 20px rgba(100,150,255,0.5), 0 0 40px rgba(100,150,255,0.3);
  margin-bottom: 5px;
  letter-spacing: 3px;
}

#gameSubtitle {
  font-size: 14px;
  color: #8899bb;
  margin-bottom: 50px;
  letter-spacing: 5px;
}

.title-btn {
  width: 200px;
  padding: 14px;
  margin: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(100,150,255,0.4);
  border-radius: 25px;
  color: #ccd;
  text-align: center;
  font-size: 15px;
  cursor: pointer;
  letter-spacing: 2px;
}

.title-btn:active {
  background: rgba(100,150,255,0.2);
  color: #fff;
}

/* Loading */
#loadingScreen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #000;
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
}

#loadingBar {
  width: 250px;
  height: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  margin-top: 20px;
  overflow: hidden;
}

#loadingFill {
  height: 100%;
  background: linear-gradient(to right, #3498db, #9b59b6);
  width: 0%;
  transition: width 0.3s;
  border-radius: 2px;
}

/* Notification */
#notification {
  position: absolute;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: #f1c40f;
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  z-index: 40;
  display: none;
  border: 1px solid rgba(241,196,15,0.3);
  white-space: nowrap;
}

/* Boss HP */
#bossHP {
  position: absolute;
  top: 50px;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  max-width: 400px;
  z-index: 10;
  display: none;
  text-align: center;
}

#bossName {
  color: #e74c3c;
  font-size: 13px;
  font-weight: bold;
  margin-bottom: 3px;
  text-shadow: 0 0 10px rgba(231,76,60,0.5);
}

#bossHPBar {
  width: 100%;
  height: 12px;
  background: rgba(0,0,0,0.7);
  border: 1px solid #e74c3c;
  border-radius: 6px;
  overflow: hidden;
}

#bossHPFill {
  height: 100%;
  background: linear-gradient(to right, #c0392b, #e74c3c);
  width: 100%;
  transition: width 0.3s;
}

/* Screen Flash */
#screenFlash {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 45;
  pointer-events: none;
  opacity: 0;
}

/* Zone Name */
#zoneName {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 0 0 20px rgba(0,0,0,0.8);
  z-index: 35;
  opacity: 0;
  pointer-events: none;
  letter-spacing: 3px;
}

#zoneSubName {
  position: absolute;
  top: 46%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #aab;
  font-size: 12px;
  z-index: 35;
  opacity: 0;
  pointer-events: none;
  letter-spacing: 5px;
}
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  
  <div id="uiLayer">
    <!-- Status Bars -->
    <div id="statusBars">
      <div class="bar-container">
        <div class="bar-fill" id="hpFill" style="width:100%"></div>
        <div class="bar-label" id="hpLabel">100 / 100</div>
      </div>
      <div class="bar-container">
        <div class="bar-fill" id="mpFill" style="width:100%"></div>
        <div class="bar-label" id="mpLabel">50 / 50</div>
      </div>
      <div class="exp-container">
        <div class="bar-fill" id="expFill" style="width:0%"></div>
      </div>
    </div>
    
    <div id="levelBadge">1</div>
    <div id="goldDisplay">💰 0</div>
    
    <div id="minimap">
      <canvas id="minimapCanvas" width="100" height="100"></canvas>
    </div>
    
    <div id="menuBtn">☰</div>
    
    <!-- Joystick -->
    <div id="joystickZone">
      <div id="joystickBase">
        <div id="joystickThumb"></div>
      </div>
    </div>
    
    <!-- Action Buttons -->
    <div id="actionButtons">
      <div class="action-btn" id="btnAttack">ATK</div>
      <div class="action-btn" id="btnSkill1">SKL</div>
      <div class="action-btn" id="btnSkill2">MAG</div>
      <div class="action-btn" id="btnDodge">EVD</div>
      <div class="action-btn" id="btnJump">JMP</div>
    </div>
    
    <!-- Dialog -->
    <div id="dialogBox">
      <div id="dialogName"></div>
      <div id="dialogText"></div>
      <div id="dialogContinue">▼ Tap to continue</div>
    </div>
    
    <!-- Boss HP -->
    <div id="bossHP">
      <div id="bossName">BOSS NAME</div>
      <div id="bossHPBar">
        <div id="bossHPFill"></div>
      </div>
    </div>
    
    <!-- Zone Name -->
    <div id="zoneName"></div>
    <div id="zoneSubName"></div>
    
    <!-- Notification -->
    <div id="notification"></div>
    
    <!-- Screen Flash -->
    <div id="screenFlash"></div>
    
    <!-- Menu Panel -->
    <div id="menuPanel">
      <div class="menu-item" onclick="Game.showInventory()">🎒 Inventory</div>
      <div class="menu-item" onclick="Game.showStats()">⚔️ Stats</div>
      <div class="menu-item" onclick="Game.showQuests()">📜 Quests</div>
      <div class="menu-item" onclick="Game.saveGame()">💾 Save Game</div>
      <div class="menu-item" onclick="Game.closeMenu()">✖ Close</div>
    </div>
    
    <!-- Inventory -->
    <div id="inventoryPanel">
      <div id="invClose" onclick="Game.closeInventory()">✖</div>
      <div id="invTitle">🎒 INVENTORY</div>
      <div id="invGrid"></div>
    </div>
    
    <!-- Stats -->
    <div id="statsPanel">
      <div id="invClose" onclick="Game.closeStats()" style="position:absolute;top:15px;right:15px;color:#fff;font-size:24px;cursor:pointer;">✖</div>
      <div id="invTitle" style="color:#f1c40f;font-size:20px;text-align:center;margin-bottom:15px;">⚔️ CHARACTER STATS</div>
      <div id="statsContent"></div>
    </div>
    
    <!-- Quests -->
    <div id="questPanel">
      <div onclick="Game.closeQuests()" style="position:absolute;top:15px;right:15px;color:#fff;font-size:24px;cursor:pointer;">✖</div>
      <div style="color:#f1c40f;font-size:20px;text-align:center;margin-bottom:15px;">📜 QUESTS</div>
      <div id="questContent"></div>
    </div>
    
    <!-- Title Screen -->
    <div id="titleScreen">
      <div id="gameTitle">SHADOW BLADE</div>
      <div id="gameSubtitle">CHRONICLE</div>
      <div class="title-btn" onclick="Game.newGame()">NEW GAME</div>
      <div class="title-btn" onclick="Game.loadGame()">CONTINUE</div>
    </div>
    
    <!-- Loading -->
    <div id="loadingScreen">
      <div>Loading...</div>
      <div id="loadingBar">
        <div id="loadingFill"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ==========================================
// SHADOW BLADE CHRONICLE - Full Game Engine
// ==========================================

const Game = {
  canvas: null,
  ctx: null,
  miniCanvas: null,
  miniCtx: null,
  width: 0,
  height: 0,
  scale: 1,
  running: false,
  paused: false,
  lastTime: 0,
  deltaTime: 0,
  camera: { x: 0, y: 0 },
  
  // Tile size
  TILE: 32,
  
  // Game state
  state: 'title', // title, loading, playing, dialog, menu
  
  // Systems
  particles: [],
  damageNumbers: [],
  screenShake: { x: 0, y: 0, intensity: 0, duration: 0 },
  notifications: [],
  
  init() {
    this.canvas = document.getElementById('gameCanvas');
    this.ctx = this.canvas.getContext('2d');
    this.miniCanvas = document.getElementById('minimapCanvas');
    this.miniCtx = this.miniCanvas.getContext('2d');
    
    this.resize();
    window.addEventListener('resize', () => this.resize());
    
    this.setupInput();
    this.hideLoading();
    
    requestAnimationFrame((t) => this.gameLoop(t));
  },
  
  resize() {
    this.width = window.innerWidth;
    this.height = window.innerHeight;
    this.canvas.width = this.width;
    this.canvas.height = this.height;
    this.scale = Math.min(this.width / 480, this.height / 320);
  },
  
  hideLoading() {
    document.getElementById('loadingFill').style.width = '100%';
    setTimeout(() => {
      document.getElementById('loadingScreen').style.display = 'none';
    }, 500);
  },
  
  newGame() {
    document.getElementById('titleScreen').style.display = 'none';
    this.state = 'playing';
    this.running = true;
    
    Player.init();
    MapManager.loadMap('village');
    EnemyManager.init();
    NPCManager.init();
    QuestManager.init();
    
    this.showZoneName('Moonlight Village', 'A peaceful beginning');
    
    setTimeout(() => {
      DialogManager.show('Elder Roth', 'Welcome, young warrior. Dark forces threaten our land. You must grow stronger to face what lies ahead.');
    }, 2000);
  },
  
  loadGame() {
    const save = localStorage.getItem('shadowBladeSave');
    if (save) {
      const data = JSON.parse(save);
      document.getElementById('titleScreen').style.display = 'none';
      this.state = 'playing';
      this.running = true;
      
      Player.init();
      Player.loadData(data.player);
      MapManager.loadMap(data.currentMap || 'village');
      EnemyManager.init();
      NPCManager.init();
      QuestManager.init();
      if (data.quests) QuestManager.loadData(data.quests);
      
      this.notify('Game Loaded!');
    } else {
      this.notify('No save data found');
    }
  },
  
  saveGame() {
    const data = {
      player: Player.getSaveData(),
      currentMap: MapManager.currentMapName,
      quests: QuestManager.getSaveData()
    };
    localStorage.setItem('shadowBladeSave', JSON.stringify(data));
    this.notify('Game Saved!');
    this.closeMenu();
  },
  
  gameLoop(timestamp) {
    this.deltaTime = Math.min((timestamp - this.lastTime) / 1000, 0.05);
    this.lastTime = timestamp;
    
    if (this.running && !this.paused) {
      this.update(this.deltaTime);
      this.render();
    }
    
    requestAnimationFrame((t) => this.gameLoop(t));
  },
  
  update(dt) {
    if (this.state !== 'playing') return;
    
    Player.update(dt);
    EnemyManager.update(dt);
    NPCManager.update(dt);
    ProjectileManager.update(dt);
    ParticleSystem.update(dt);
    this.updateCamera(dt);
    this.updateScreenShake(dt);
    this.updateUI();
    
    // Check zone transitions
    MapManager.checkTransitions();
  },
  
  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.width, this.height);
    
    ctx.save();
    
    // Apply camera + screen shake
    const cx = -this.camera.x + this.width / 2 + this.screenShake.x;
    const cy = -this.camera.y + this.height / 2 + this.screenShake.y;
    ctx.translate(cx, cy);
    
    // Render layers
    MapManager.renderBackground(ctx);
    MapManager.renderGround(ctx);
    
    // Render entities sorted by Y
    const entities = [
      ...EnemyManager.enemies.filter(e => e.alive),
      ...NPCManager.npcs,
      Player,
      ...ProjectileManager.projectiles
    ].sort((a, b) => a.y - b.y);
    
    entities.forEach(e => e.render(ctx));
    
    MapManager.renderForeground(ctx);
    ParticleSystem.render(ctx);
    
    ctx.restore();
    
    // Render minimap
    this.renderMinimap();
  },
  
  updateCamera(dt) {
    const targetX = Player.x;
    const targetY = Player.y;
    const speed = 5;
    
    this.camera.x += (targetX - this.camera.x) * speed * dt;
    this.camera.y += (targetY - this.camera.y) * speed * dt;
    
    // Clamp to map bounds
    const map = MapManager.currentMap;
    if (map) {
      const halfW = this.width / 2;
      const halfH = this.height / 2;
      this.camera.x = Math.max(halfW, Math.min(map.width * this.TILE - halfW, this.camera.x));
      this.camera.y = Math.max(halfH, Math.min(map.height * this.TILE - halfH, this.camera.y));
    }
  },
  
  updateScreenShake(dt) {
    if (this.screenShake.duration > 0) {
      this.screenShake.duration -= dt;
      this.screenShake.x = (Math.random() - 0.5) * this.screenShake.intensity;
      this.screenShake.y = (Math.random() - 0.5) * this.screenShake.intensity;
    } else {
      this.screenShake.x = 0;
      this.screenShake.y = 0;
    }
  },
  
  shake(intensity, duration) {
    this.screenShake.intensity = intensity;
    this.screenShake.duration = duration;
  },
  
  flash(color, duration) {
    const el = document.getElementById('screenFlash');
    el.style.background = color;
    el.style.opacity = '0.3';
    setTimeout(() => { el.style.opacity = '0'; }, duration || 100);
  },
  
  updateUI() {
    const hpPct = (Player.hp / Player.maxHp) * 100;
    const mpPct = (Player.mp / Player.maxMp) * 100;
    const expPct = (Player.exp / Player.expToLevel) * 100;
    
    document.getElementById('hpFill').style.width = hpPct + '%';
    document.getElementById('mpFill').style.width = mpPct + '%';
    document.getElementById('expFill').style.width = expPct + '%';
    document.getElementById('hpLabel').textContent = Math.floor(Player.hp) + ' / ' + Player.maxHp;
    document.getElementById('mpLabel').textContent = Math.floor(Player.mp) + ' / ' + Player.maxMp;
    document.getElementById('levelBadge').textContent = Player.level;
    document.getElementById('goldDisplay').textContent = '💰 ' + Player.gold;
  },
  
  renderMinimap() {
    const ctx = this.miniCtx;
    const map = MapManager.currentMap;
    if (!map) return;
    
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, 100, 100);
    
    const scaleX = 100 / (map.width * this.TILE);
    const scaleY = 100 / (map.height * this.TILE);
    
    // Draw map tiles
    for (let y = 0; y < map.height; y++) {
      for (let x = 0; x < map.width; x++) {
        const tile = map.collision[y][x];
        if (tile === 1) {
          ctx.fillStyle = '#444';
        } else {
          ctx.fillStyle = '#2a3a2a';
        }
        ctx.fillRect(x * this.TILE * scaleX, y * this.TILE * scaleY, 
                     this.TILE * scaleX + 1, this.TILE * scaleY + 1);
      }
    }
    
    // Draw enemies
    ctx.fillStyle = '#e74c3c';
    EnemyManager.enemies.forEach(e => {
      if (e.alive) {
        ctx.fillRect(e.x * scaleX - 1, e.y * scaleY - 1, 3, 3);
      }
    });
    
    // Draw NPCs
    ctx.fillStyle = '#2ecc71';
    NPCManager.npcs.forEach(n => {
      ctx.fillRect(n.x * scaleX - 1, n.y * scaleY - 1, 3, 3);
    });
    
    // Draw player
    ctx.fillStyle = '#3498db';
    ctx.fillRect(Player.x * scaleX - 2, Player.y * scaleY - 2, 5, 5);
  },
  
  showZoneName(name, sub) {
    const el = document.getElementById('zoneName');
    const el2 = document.getElementById('zoneSubName');
    el.textContent = name;
    el2.textContent = sub || '';

    setTimeout(() => { el2.style.transition = 'opacity 1s'; el2.style.opacity = '1'; }, 500);
    setTimeout(() => { el.style.opacity = '0'; el2.style.opacity = '0'; }, 3000);
  },
  
  notify(text) {

  showDamage(x, y, amount, color) {

  showMenu() {

  },
  
  closeMenu() {

  showInventory() {

    document.getElementById('inventoryPanel').style.display = 'flex';

  },
  
  closeInventory() {

  },
  
  renderInventory() {

    grid.innerHTML = '';
    
    for (let i = 0; i < 20; i++) {
      const slot = document.createElement('div');
      slot.className = 'inv-slot';
      
      if (i < Player.inventory.length) {
        const item = Player.inventory[i];
        slot.innerHTML = `<span style="font-size:28px">${item.icon}</span>`;
        if (item.count > 1) {
          slot.innerHTML += `<span class="inv-count">${item.count}</span>`;
        }
        if (item.equipped) slot.classList.add('equipped');
        slot.onclick = () => this.useItem(i);
      }
      
      grid.appendChild(slot);
    }
  },
  
  useItem(index) {
    const item = Player.inventory[index];
    if (!item) return;
    
    if (item.type === 'potion') {
      if (item.id === 'hp_potion') {
        Player.hp = Math.min(Player.maxHp, Player.hp + 30);
        this.notify('Restored 30 HP!');
      } else if (item.id === 'mp_potion') {
        Player.mp = Math.min(Player.maxMp, Player.mp + 20);
        this.notify('Restored 20 MP!');
      }
      item.count--;
      if (item.count <= 0) Player.inventory.splice(index, 1);
      this.renderInventory();
    }

  showStats() {

  closeQuests() {

  // Input
  setupInput() {
    // Joystick
    const jZone = document.getElementById('joystickZone');
    const jBase = document.getElementById('joystickBase');
    const jThumb = document.getElementById('joystickThumb');
    
    let jActive = false;
    let jCenter = { x: 70, y: 70 };
    const jRadius = 45;
    
    const handleJoystick = (cx, cy) => {
      const rect = jZone.getBoundingClientRect();
      const dx = cx - rect.left - jCenter.x;
      const dy = cy - rect.top - jCenter.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const clampDist = Math.min(dist, jRadius);
      const angle = Math.atan2(dy, dx);
      
      const nx = Math.cos(angle) * clampDist;
      const ny = Math.sin(angle) * clampDist;
      
      jThumb.style.left = (jCenter.x - 25 + nx) + 'px';
      jThumb.style.top = (jCenter.y - 25 + ny) + 'px';
      
      InputManager.joystick.x = nx / jRadius;
      InputManager.joystick.y = ny / jRadius;
      InputManager.joystick.active = true;
    };
    
    jZone.addEventListener('touchstart', (e) => {
      e.preventDefault();
      jActive = true;
      handleJoystick(e.touches[0].clientX, e.touches[0].clientY);
    });
    
    jZone.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (jActive) handleJoystick(e.touches[0].clientX, e.touches[0].clientY);
    });
    
    jZone.addEventListener('touchend', (e) => {
      e.preventDefault();
      jActive = false;
      jThumb.style.left = '45px';
      jThumb.style.top = '45px';
      InputManager.joystick.x = 0;
      InputManager.joystick.y = 0;
      InputManager.joystick.active = false;
    });
    
    // Buttons
    const setupBtn = (id, action) => {
      const btn = document.getElementById(id);
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); action(true); });
      btn.addEventListener('touchend', (e) => { e.preventDefault(); action(false); });
      btn.addEventListener('mousedown', (e) => { e.preventDefault(); action(true); });
      btn.addEventListener('mouseup', (e) => { e.preventDefault(); action(false); });
    };
    
    setupBtn('btnAttack', (down) => { if (down) Player.attack(); });
    setupBtn('btnSkill1', (down) => { if (down) Player.useSkill(1); });
    setupBtn('btnSkill2', (down) => { if (down) Player.useSkill(2); });
    setupBtn('btnDodge', (down) => { if (down) Player.dodge(); });
    setupBtn('btnJump', (down) => { if (down) Player.jump(); });
    
    // Menu
    document.getElementById('menuBtn').addEventListener('click', () => {
      if (this.paused) this.closeMenu();
      else this.showMenu();
    });
    
    // Dialog
    document.getElementById('dialogBox').addEventListener('click', () => {
      DialogManager.advance();
    });
    
    // Keyboard (for testing on PC)
    document.addEventListener('keydown', (e) => {
      InputManager.keys[e.key.toLowerCase()] = true;
      if (e.key === ' ') Player.attack();
      if (e.key === 'q') Player.useSkill(1);
      if (e.key === 'e') Player.useSkill(2);
      if (e.key === 'Shift') Player.dodge();
    });
    document.addEventListener('keyup', (e) => {
      InputManager.keys[e.key.toLowerCase()] = false;
    });
  }
};

// INPUT MANAGER
// ==========================================
const InputManager = {
  joystick: { x: 0, y: 0, active: false },
  keys: {},
  
  getMovement() {
    let mx = this.joystick.x;
    let my = this.joystick.y;
    
    if (this.keys['a'] || this.keys['arrowleft']) mx = -1;
    if (this.keys['d'] || this.keys['arrowright']) mx = 1;
    if (this.keys['w'] || this.keys['arrowup']) my = -1;
    if (this.keys['s'] || this.keys['arrowdown']) my = 1;
    
    return { x: mx, y: my };
  }
};

// ==========================================
// SPRITE RENDERER - Procedural pixel art
// ==========================================
const SpriteLib = {
  cache: {},
  
  createCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    return { canvas: c, ctx: c.getContext('2d') };
  },
  
  // Draw a pixel art character
  drawPixelChar(ctx, x, y, colors, scale = 1) {
    const s = scale;
    const c = colors;
    
    // This is a template - actual sprites would be loaded as images
    // For now we draw detailed pixel art procedurally
  },
  
  generatePlayerSprites() {
    const frames = {};
    const directions = ['down', 'left', 'right', 'up'];
    const actions = ['idle', 'walk', 'attack', 'hurt', 'dodge'];
    
    actions.forEach(action => {
      directions.forEach(dir => {
        const frameCount = action === 'idle' ? 4 : action === 'walk' ? 6 : action === 'attack' ? 5 : 3;
        frames[`${action}_${dir}`] = [];
        
        for (let f = 0; f < frameCount; f++) {
          const { canvas, ctx } = this.createCanvas(48, 48);
          this.drawKnight(ctx, 24, 36, dir, action, f, frameCount);
          frames[`${action}_${dir}`].push(canvas);
        }
      });
    });
    
    return frames;
  },
  
  drawKnight(ctx, cx, cy, dir, action, frame, totalFrames) {
    ctx.imageSmoothingEnabled = false;
    
    const p = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
    };
    
    const p1 = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 1, 1);
    };
    
    // Animation offsets
    let bobY = 0;
    let legOffset = 0;
    let armAngle = 0;
    let attackSwing = 0;
    
    if (action === 'idle') {
      bobY = Math.sin(frame / totalFrames * Math.PI * 2) * 1;
    } else if (action === 'walk') {
      bobY = Math.sin(frame / totalFrames * Math.PI * 2) * 1.5;
      legOffset = Math.sin(frame / totalFrames * Math.PI * 2) * 3;
    } else if (action === 'attack') {
      attackSwing = (frame / totalFrames) * Math.PI;
      bobY = -Math.sin(attackSwing) * 2;
    } else if (action === 'hurt') {
      bobY = (frame === 1) ? -3 : 0;
    }
    
    const baseX = cx - 12;
    const baseY = cy - 28 + bobY;
    
    const flipX = dir === 'left';
    const drawSide = dir === 'left' || dir === 'right';
    const drawBack = dir === 'up';
    
    ctx.save();
    if (flipX) {
      ctx.translate(48, 0);
      ctx.scale(-1, 1);
    }
    
    // Colors
    const armor = '#6688aa';
    const armorDark = '#4a6680';
    const armorLight = '#88aacc';
    const skin = '#f0c8a0';
    const skinDark = '#d4a878';
    const hair = '#443322';
    const eye = '#222';
    const capeColor = '#cc3333';
    const capeDark = '#992222';
    const bootColor = '#554433';
    const bootDark = '#332211';
    const swordBlade = '#ddeeff';
    const swordHilt = '#886622';
    
    // Cape (behind body)
    if (!drawBack) {
      for (let i = 0; i < 6; i++) {
        p(baseX + 6 + i * 2, baseY + 14 + Math.sin(frame * 0.5 + i) * 1, capeColor);
        p(baseX + 6 + i * 2, baseY + 16 + Math.sin(frame * 0.5 + i) * 1.5, capeDark);
        p(baseX + 6 + i * 2, baseY + 18 + Math.sin(frame * 0.5 + i) * 2, capeColor);
      }
    }
    
    // Legs
    const legL = legOffset;
    const legR = -legOffset;
    
    // Left leg
    p(baseX + 8, baseY + 22 + legL, bootColor);
    p(baseX + 8, baseY + 24 + legL, bootDark);
    p(baseX + 8, baseY + 26 + legL, bootDark);
    
    // Right leg
    p(baseX + 14, baseY + 22 + legR, bootColor);
    p(baseX + 14, baseY + 24 + legR, bootDark);
    p(baseX + 14, baseY + 26 + legR, bootDark);
    
    // Body armor
    for (let i = 0; i < 5; i++) {
      p(baseX + 6 + i * 2, baseY + 12, i === 2 ? armorLight : armor);
      p(baseX + 6 + i * 2, baseY + 14, armor);
      p(baseX + 6 + i * 2, baseY + 16, armorDark);
      p(baseX + 6 + i * 2, baseY + 18, armor);
      p(baseX + 6 + i * 2, baseY + 20, armorDark);
    }
    
    // Shoulder pads
    p(baseX + 4, baseY + 12, armorLight);
    p(baseX + 4, baseY + 14, armor);
    p(baseX + 18, baseY + 12, armorLight);
    p(baseX + 18, baseY + 14, armor);
    
    // Head
    if (drawBack) {
      // Back of head
      for (let i = 0; i < 4; i++) {
        p(baseX + 8 + i * 2, baseY + 2, hair);
        p(baseX + 8 + i * 2, baseY + 4, hair);
        p(baseX + 8 + i * 2, baseY + 6, hair);
        p(baseX + 8 + i * 2, baseY + 8, hair);
        p(baseX + 8 + i * 2, baseY + 10, hair);
      }
    } else {
      // Hair top
      for (let i = 0; i < 4; i++) {
        p(baseX + 8 + i * 2, baseY + 0, hair);
        p(baseX + 8 + i * 2, baseY + 2, hair);
      }
      p(baseX + 6, baseY + 2, hair);
      p(baseX + 16, baseY + 2, hair);
      
      // Face
      for (let i = 0; i < 4; i++) {
        p(baseX + 8 + i * 2, baseY + 4, skin);
        p(baseX + 8 + i * 2, baseY + 6, skin);
        p(baseX + 8 + i * 2, baseY + 8, skin);
        p(baseX + 8 + i * 2, baseY + 10, skinDark);
      }
      
      // Eyes
      p1(baseX + 9, baseY + 6, eye);
      p1(baseX + 10, baseY + 6, eye);
      p1(baseX + 13, baseY + 6, eye);
      p1(baseX + 14, baseY + 6, eye);
      
      // Mouth
      p1(baseX + 11, baseY + 9, skinDark);
      p1(baseX + 12, baseY + 9, skinDark);
      
      // Helmet/crown accent
      p(baseX + 8, baseY + 2, '#8B7355');
      p(baseX + 14, baseY + 2, '#8B7355');
      p1(baseX + 11, baseY + 1, '#f1c40f');
      p1(baseX + 12, baseY + 1, '#f1c40f');
    }
    
    // Sword (right arm)
    if (action === 'attack') {
      const swingProgress = frame / totalFrames;
      const swordLen = 14;
      
      if (drawSide || dir === 'down') {
        // Swing animation
        for (let i = 0; i < swordLen; i++) {
          const angle = -Math.PI / 2 + swingProgress * Math.PI * 1.3;
          const sx = baseX + 20 + Math.cos(angle) * i * 1.5;
          const sy = baseY + 14 + Math.sin(angle) * i * 1.5;
          p1(sx, sy, i < 2 ? swordHilt : swordBlade);
          p1(sx + 1, sy, i < 2 ? swordHilt : swordBlade);
        }
        
        // Attack effect
        if (frame >= 2 && frame <= 3) {
          ctx.strokeStyle = 'rgba(255,255,200,0.6)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(baseX + 24, baseY + 10, 12 + frame * 3, -0.5, 1.5);
          ctx.stroke();
        }
      }
    } else {
      // Sword at rest
      if (drawSide || dir === 'down') {
        for (let i = 0; i < 10; i++) {
          const sx = baseX + 20;
          const sy = baseY + 12 + i * 1.5;
          p1(sx, sy, i < 2 ? swordHilt : swordBlade);
          p1(sx + 1, sy, i < 2 ? swordHilt : swordBlade);
        }
        // Cross guard
        p1(baseX + 18, baseY + 14, swordHilt);
        p1(baseX + 19, baseY + 14, swordHilt);
        p1(baseX + 22, baseY + 14, swordHilt);
        p1(baseX + 23, baseY + 14, swordHilt);
      }
    }
    
    // Shield (left arm)
    if (drawSide || dir === 'down') {
      const shX = baseX + 2;
      const shY = baseY + 14;
      p(shX, shY, '#667');
      p(shX, shY + 2, '#556');
      p(shX, shY + 4, '#667');
      p(shX + 2, shY, '#778');
      p(shX + 2, shY + 2, '#f1c40f');
      p(shX + 2, shY + 4, '#778');
    }
    
    // Dodge effect
    if (action === 'dodge') {
      ctx.globalAlpha = 0.5;
      // After images would go here
      ctx.globalAlpha = 1.0;
    }
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.restore();
  },
  
  generateEnemySprites(type) {
    const frames = {};
    const directions = ['down', 'left', 'right', 'up'];
    
    ['idle', 'walk', 'attack', 'hurt', 'death'].forEach(action => {
      directions.forEach(dir => {
        const count = action === 'death' ? 5 : action === 'attack' ? 4 : 4;
        frames[`${action}_${dir}`] = [];
        
        for (let f = 0; f < count; f++) {
          const { canvas, ctx } = this.createCanvas(48, 48);
          
          switch(type) {
            case 'slime':
              this.drawSlime(ctx, 24, 36, dir, action, f, count);
              break;
            case 'skeleton':
              this.drawSkeleton(ctx, 24, 36, dir, action, f, count);
              break;
            case 'goblin':
              this.drawGoblin(ctx, 24, 36, dir, action, f, count);
              break;
            case 'dark_knight':
              this.drawDarkKnight(ctx, 24, 36, dir, action, f, count);
              break;
            case 'dragon':
              this.drawDragon(ctx, 24, 36, dir, action, f, count);
              break;
            default:
              this.drawSlime(ctx, 24, 36, dir, action, f, count);
          }
          
          frames[`${action}_${dir}`].push(canvas);
        }
      });
    });
    
    return frames;
  },
  
  drawSlime(ctx, cx, cy, dir, action, frame, total) {
    const p = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
    };
    
    const squish = action === 'idle' ? Math.sin(frame / total * Math.PI * 2) * 2 : 0;
    const jumpY = action === 'attack' ? -Math.sin(frame / total * Math.PI) * 8 : 0;
    const hurtShake = action === 'hurt' ? (frame % 2) * 2 - 1 : 0;
    
    const baseX = cx - 10 + hurtShake;
    const baseY = cy - 16 + jumpY;
    
    const body = '#44bb44';
    const bodyDark = '#228822';
    const bodyLight = '#66dd66';
    const eyeColor = '#fff';
    const pupil = '#222';
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Body
    for (let i = 0; i < 5; i++) {
      p(baseX + 2 + i * 2, baseY + 8 + squish, body);
      p(baseX + 2 + i * 2, baseY + 10 + squish * 0.5, bodyDark);
      p(baseX + 2 + i * 2, baseY + 12, bodyDark);
    }
    for (let i = 0; i < 4; i++) {
      p(baseX + 4 + i * 2, baseY + 4 - squish * 0.5, bodyLight);
      p(baseX + 4 + i * 2, baseY + 6, body);
    }
    for (let i = 0; i < 3; i++) {
      p(baseX + 6 + i * 2, baseY + 2 - squish, bodyLight);
    }
    
    // Eyes
    if (action !== 'death' || frame < 3) {
      p(baseX + 4, baseY + 6, eyeColor);
      p(baseX + 10, baseY + 6, eyeColor);
      ctx.fillStyle = pupil;
      ctx.fillRect(baseX + 5, baseY + 7, 1, 1);
      ctx.fillRect(baseX + 11, baseY + 7, 1, 1);
    }
    
    // Death animation
    if (action === 'death') {
      ctx.globalAlpha = 1 - (frame / total);
    }
  },
  
  drawSkeleton(ctx, cx, cy, dir, action, frame, total) {
    const p = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
    };
    
    const walkBob = action === 'walk' ? Math.sin(frame / total * Math.PI * 2) * 1.5 : 0;
    const baseX = cx - 10;
    const baseY = cy - 26 + walkBob;
    
    const bone = '#e8e0d0';
    const boneDark = '#c8b8a0';
    const eyeGlow = '#ff4444';
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Legs
    const legOff = action === 'walk' ? Math.sin(frame / total * Math.PI * 2) * 2 : 0;
    p(baseX + 6, baseY + 20 + legOff, bone);
    p(baseX + 6, baseY + 22 + legOff, boneDark);
    p(baseX + 6, baseY + 24 + legOff, bone);
    p(baseX + 12, baseY + 20 - legOff, bone);
    p(baseX + 12, baseY + 22 - legOff, boneDark);
    p(baseX + 12, baseY + 24 - legOff, bone);
    
    // Ribcage
    for (let i = 0; i < 4; i++) {
      p(baseX + 6 + i * 2, baseY + 12, bone);
      p(baseX + 6 + i * 2, baseY + 14, i % 2 === 0 ? boneDark : bone);
      p(baseX + 6 + i * 2, baseY + 16, bone);
      p(baseX + 6 + i * 2, baseY + 18, boneDark);
    }
    
    // Skull
    for (let i = 0; i < 3; i++) {
      p(baseX + 6 + i * 2, baseY + 2, bone);
      p(baseX + 6 + i * 2, baseY + 4, bone);
      p(baseX + 6 + i * 2, baseY + 6, bone);
      p(baseX + 6 + i * 2, baseY + 8, boneDark);
    }
    p(baseX + 8, baseY + 0, bone);
    
    // Eye sockets
    p(baseX + 6, baseY + 4, '#222');
    p(baseX + 10, baseY + 4, '#222');
    ctx.fillStyle = eyeGlow;
    ctx.fillRect(baseX + 7, baseY + 5, 1, 1);
    ctx.fillRect(baseX + 11, baseY + 5, 1, 1);
    
    // Sword
    if (action === 'attack') {
      const swing = frame / total * Math.PI;
      for (let i = 0; i < 8; i++) {
        const sx = baseX + 16 + Math.cos(-Math.PI/3 + swing) * i * 2;
        const sy = baseY + 14 + Math.sin(-Math.PI/3 + swing) * i * 2;
        ctx.fillStyle = i < 2 ? '#886622' : '#aabbcc';
        ctx.fillRect(sx, sy, 2, 2);
      }
    } else {
      for (let i = 0; i < 6; i++) {
        ctx.fillStyle = i < 1 ? '#886622' : '#aabbcc';
        ctx.fillRect(baseX + 16, baseY + 10 + i * 2, 2, 2);
      }
    }
    
    if (action === 'death') ctx.globalAlpha = 1 - frame / total;
  },
  
  drawGoblin(ctx, cx, cy, dir, action, frame, total) {
    const p = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
    };
    
    const bob = action === 'walk' ? Math.sin(frame / total * Math.PI * 2) * 1 : 0;
    const baseX = cx - 10;
    const baseY = cy - 22 + bob;
    
    const skin = '#88aa44';
    const skinDark = '#668833';
    const cloth = '#885533';
    const clothDark = '#663322';
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Legs
    const legOff = action === 'walk' ? Math.sin(frame / total * Math.PI * 2) * 2 : 0;
    p(baseX + 6, baseY + 18 + legOff, cloth);
    p(baseX + 6, baseY + 20 + legOff, skinDark);
    p(baseX + 12, baseY + 18 - legOff, cloth);
    p(baseX + 12, baseY + 20 - legOff, skinDark);
    
    // Body
    for (let i = 0; i < 4; i++) {
      p(baseX + 4 + i * 2, baseY + 10, cloth);
      p(baseX + 4 + i * 2, baseY + 12, clothDark);
      p(baseX + 4 + i * 2, baseY + 14, cloth);
      p(baseX + 4 + i * 2, baseY + 16, clothDark);
    }
    
    // Head (big for goblin)
    for (let i = 0; i < 4; i++) {
      p(baseX + 4 + i * 2, baseY + 0, skin);
      p(baseX + 4 + i * 2, baseY + 2, skin);
      p(baseX + 4 + i * 2, baseY + 4, skin);
      p(baseX + 4 + i * 2, baseY + 6, skinDark);
      p(baseX + 4 + i * 2, baseY + 8, skin);
    }
    
    // Big ears
    p(baseX + 0, baseY + 2, skin);
    p(baseX + 0, baseY + 4, skinDark);
    p(baseX + 14, baseY + 2, skin);
    p(baseX + 14, baseY + 4, skinDark);
    
    // Eyes (big, yellow)
    ctx.fillStyle = '#ff0';
    ctx.fillRect(baseX + 5, baseY + 3, 2, 2);
    ctx.fillRect(baseX + 11, baseY + 3, 2, 2);
    ctx.fillStyle = '#000';
    ctx.fillRect(baseX + 6, baseY + 4, 1, 1);
    ctx.fillRect(baseX + 12, baseY + 4, 1, 1);
    
    // Dagger
    if (action === 'attack') {
      const sw = frame / total;
      for (let i = 0; i < 5; i++) {
        ctx.fillStyle = i < 1 ? '#654' : '#ccc';
        ctx.fillRect(baseX + 16 + sw * 6, baseY + 8 + i * 2 - sw * 4, 2, 2);
      }
    }
    
    if (action === 'death') ctx.globalAlpha = 1 - frame / total;
  },
  
  drawDarkKnight(ctx, cx, cy, dir, action, frame, total) {
    // Similar to knight but with dark colors
    const p = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
    };
    
    const bob = action === 'walk' ? Math.sin(frame / total * Math.PI * 2) * 1 : 0;
    const baseX = cx - 12;
    const baseY = cy - 28 + bob;
    
    // Dark armor colors
    const armor = '#334';
    const armorDark = '#223';
    const armorLight = '#445';
    const eyeGlow = '#f44';
    const capec = '#440022';
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Dark aura
    ctx.fillStyle = 'rgba(100,0,50,0.15)';
    ctx.beginPath();
    ctx.ellipse(cx, cy - 10, 18, 20, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Cape
    for (let i = 0; i < 6; i++) {
      p(baseX + 6 + i * 2, baseY + 14 + Math.sin(frame * 0.5 + i) * 1, capec);
      p(baseX + 6 + i * 2, baseY + 16, capec);
      p(baseX + 6 + i * 2, baseY + 18 + Math.sin(frame * 0.3 + i) * 1.5, '#330011');
    }
    
    // Legs
    const legOff = action === 'walk' ? Math.sin(frame / total * Math.PI * 2) * 3 : 0;
    p(baseX + 8, baseY + 22 + legOff, armorDark);
    p(baseX + 8, baseY + 24 + legOff, '#111');
    p(baseX + 8, baseY + 26 + legOff, '#111');
    p(baseX + 14, baseY + 22 - legOff, armorDark);
    p(baseX + 14, baseY + 24 - legOff, '#111');
    p(baseX + 14, baseY + 26 - legOff, '#111');
    
    // Body armor
    for (let i = 0; i < 5; i++) {
      p(baseX + 6 + i * 2, baseY + 12, armor);
      p(baseX + 6 + i * 2, baseY + 14, armorDark);
      p(baseX + 6 + i * 2, baseY + 16, armor);
      p(baseX + 6 + i * 2, baseY + 18, armorDark);
      p(baseX + 6 + i * 2, baseY + 20, armor);
    }
    
    // Shoulder spikes
    p(baseX + 4, baseY + 10, armorLight);
    p(baseX + 4, baseY + 12, armor);
    p(baseX + 2, baseY + 8, '#555');
    p(baseX + 18, baseY + 10, armorLight);
    p(baseX + 18, baseY + 12, armor);
    p(baseX + 20, baseY + 8, '#555');
    
    // Helmet
    for (let i = 0; i < 4; i++) {
      p(baseX + 8 + i * 2, baseY + 0, armorDark);
      p(baseX + 8 + i * 2, baseY + 2, armor);
      p(baseX + 8 + i * 2, baseY + 4, armor);
      p(baseX + 8 + i * 2, baseY + 6, armorDark);
      p(baseX + 8 + i * 2, baseY + 8, armor);
      p(baseX + 8 + i * 2, baseY + 10, armorDark);
    }
    
    // Helmet visor - glowing eyes
    p(baseX + 8, baseY + 6, '#000');
    p(baseX + 12, baseY + 6, '#000');
    ctx.fillStyle = eyeGlow;
    ctx.fillRect(baseX + 9, baseY + 7, 2, 1);
    ctx.fillRect(baseX + 13, baseY + 7, 2, 1);
    
    // Helmet horn
    p(baseX + 10, baseY - 2, '#666');
    p(baseX + 12, baseY - 2, '#666');
    
    // Dark sword
    if (action === 'attack') {
      for (let i = 0; i < 12; i++) {
        const sw = frame / total * Math.PI;
        const sx = baseX + 20 + Math.cos(-Math.PI/2 + sw) * i * 2;
        const sy = baseY + 12 + Math.sin(-Math.PI/2 + sw) * i * 2;
        ctx.fillStyle = i < 2 ? '#442' : (i < 4 ? '#556' : '#889');
        ctx.fillRect(sx, sy, 2, 2);
      }
      // Slash effect
      if (frame >= 2) {
        ctx.strokeStyle = 'rgba(255,50,50,0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(baseX + 24, baseY + 8, 15 + frame * 3, -0.8, 1.2);
        ctx.stroke();
      }
    } else {
      for (let i = 0; i < 10; i++) {
        ctx.fillStyle = i < 2 ? '#442' : '#667';
        ctx.fillRect(baseX + 20, baseY + 10 + i * 2, 2, 2);
      }
    }
    
    if (action === 'death') ctx.globalAlpha = 1 - frame / total;
  },
  
  drawDragon(ctx, cx, cy, dir, action, frame, total) {
    const p = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
    };
    
    const bob = Math.sin(frame / total * Math.PI * 2) * 2;
    const baseX = cx - 20;
    const baseY = cy - 30 + bob;
    
    const scaleC = '#882222';
    const scaleDark = '#661111';
    const scaleLight = '#aa4444';
    const belly = '#cc9944';
    const eyeC = '#ffff00';
    const wing = '#993333';
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 2, 16, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Wings
    const wingFlap = Math.sin(frame / total * Math.PI * 2) * 5;
    // Left wing
    for (let i = 0; i < 4; i++) {
      p(baseX + 2, baseY + 8 + i * 2 - wingFlap, wing);
      p(baseX, baseY + 10 + i * 2 - wingFlap * 0.8, wing);
    }
    // Right wing
    for (let i = 0; i < 4; i++) {
      p(baseX + 36, baseY + 8 + i * 2 - wingFlap, wing);
      p(baseX + 38, baseY + 10 + i * 2 - wingFlap * 0.8, wing);
    }
    
    // Tail
    for (let i = 0; i < 5; i++) {
      const tailWag = Math.sin(frame * 0.5 + i * 0.3) * 2;
      p(baseX + 6 + i, baseY + 24 + i + tailWag, scaleDark);
    }
    
    // Legs
    p(baseX + 10, baseY + 24, scaleDark);
    p(baseX + 10, baseY + 26, scaleDark);
    p(baseX + 10, baseY + 28, '#333');
    p(baseX + 26, baseY + 24, scaleDark);
    p(baseX + 26, baseY + 26, scaleDark);
    p(baseX + 26, baseY + 28, '#333');
    
    // Body
    for (let i = 0; i < 7; i++) {
      p(baseX + 10 + i * 2, baseY + 14, scaleC);
      p(baseX + 10 + i * 2, baseY + 16, i >= 2 && i <= 4 ? belly : scaleC);
      p(baseX + 10 + i * 2, baseY + 18, i >= 2 && i <= 4 ? belly : scaleDark);
      p(baseX + 10 + i * 2, baseY + 20, scaleC);
      p(baseX + 10 + i * 2, baseY + 22, scaleDark);
    }
    
    // Neck
    for (let i = 0; i < 3; i++) {
      p(baseX + 14 + i * 2, baseY + 10, scaleLight);
      p(baseX + 14 + i * 2, baseY + 12, scaleC);
    }
    
    // Head
    for (let i = 0; i < 4; i++) {
      p(baseX + 12 + i * 2, baseY + 4, scaleC);
      p(baseX + 12 + i * 2, baseY + 6, scaleC);
      p(baseX + 12 + i * 2, baseY + 8, scaleDark);
    }
    p(baseX + 10, baseY + 6, scaleLight);
    p(baseX + 22, baseY + 6, scaleLight);
    
    // Horns
    p(baseX + 12, baseY + 2, '#666');
    p(baseX + 12, baseY + 0, '#888');
    p(baseX + 20, baseY + 2, '#666');
    p(baseX + 20, baseY + 0, '#888');
    
    // Eyes
    p(baseX + 14, baseY + 5, eyeC);
    p(baseX + 18, baseY + 5, eyeC);
    ctx.fillStyle = '#000';
    ctx.fillRect(baseX + 15, baseY + 6, 1, 1);
    ctx.fillRect(baseX + 19, baseY + 6, 1, 1);
    
    // Fire breath during attack
    if (action === 'attack' && frame >= 1) {
      const fireLen = frame * 4;
      for (let i = 0; i < fireLen; i++) {
        const fx = baseX + 16 + i * 2 + (dir === 'left' ? -i * 4 : 0);
        const fy = baseY + 8 + Math.sin(i + frame) * 2;
        ctx.fillStyle = i < fireLen * 0.3 ? '#ff4' : (i < fireLen * 0.6 ? '#f84' : '#f44');
        ctx.fillRect(fx, fy, 3, 3);
      }
    }
    
    // Spines on back
    for (let i = 0; i < 3; i++) {
      p(baseX + 14 + i * 4, baseY + 12, '#aa5555');
    }
    
    if (action === 'death') ctx.globalAlpha = 1 - frame / total;
  },
  
  generateNPCSprite(type) {
    const frames = {};
    
    ['idle_down', 'idle_left', 'idle_right', 'idle_up'].forEach(key => {
      frames[key] = [];
      for (let f = 0; f < 4; f++) {
        const { canvas, ctx } = this.createCanvas(48, 48);
        this.drawNPC(ctx, 24, 36, type, f);
        frames[key].push(canvas);
      }
    });
    
    return frames;
  },
  
  drawNPC(ctx, cx, cy, type, frame) {
    const p = (x, y, color) => {
      ctx.fillStyle = color;
      ctx.fillRect(Math.floor(x), Math.floor(y), 2, 2);
    };
    
    const bob = Math.sin(frame * Math.PI / 2) * 0.5;
    const baseX = cx - 10;
    const baseY = cy - 26 + bob;
    
    let robeColor, robeDark, hairColor, skinC;
    
    switch(type) {
      case 'elder':
        robeColor = '#664488';
        robeDark = '#442266';
        hairColor = '#ccc';
        skinC = '#f0c8a0';
        break;
      case 'merchant':
        robeColor = '#886633';
        robeDark = '#664422';
        hairColor = '#443322';
        skinC = '#ddb888';
        break;
      case 'guard':
        robeColor = '#4466aa';
        robeDark = '#334488';
        hairColor = '#332211';
        skinC = '#f0c8a0';
        break;
      default:
        robeColor = '#558855';
        robeDark = '#336633';
        hairColor = '#553322';
        skinC = '#f0c8a0';
    }
    
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + 1, 8, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Robe/body
    for (let i = 0; i < 4; i++) {
      p(baseX + 4 + i * 2, baseY + 12, robeColor);
      p(baseX + 4 + i * 2, baseY + 14, robeDark);
      p(baseX + 4 + i * 2, baseY + 16, robeColor);
      p(baseX + 4 + i * 2, baseY + 18, robeDark);
      p(baseX + 4 + i * 2, baseY + 20, robeColor);
      p(baseX + 4 + i * 2, baseY + 22, robeDark);
      p(baseX + 4 + i * 2, baseY + 24, robeColor);
    }
    
    // Head
    for (let i = 0; i < 3; i++) {
      p(baseX + 4 + i * 2, baseY + 2, hairColor);
      p(baseX + 4 + i * 2, baseY + 4, skinC);
      p(baseX + 4 + i * 2, baseY + 6, skinC);
      p(baseX + 4 + i * 2, baseY + 8, skinC);
      p(baseX + 4 + i * 2, baseY + 10, robeDark);
    }
    p(baseX + 6, baseY + 0, hairColor);
    
    // Eyes
    ctx.fillStyle = '#222';
    ctx.fillRect(baseX + 5, baseY + 5, 1, 1);
    ctx.fillRect(baseX + 9, baseY + 5, 1, 1);
    
    // NPC indicator
    if (type === 'merchant') {
      // Small bag icon
      p(baseX + 12, baseY + 14, '#886622');
      p(baseX + 14, baseY + 14, '#aa8833');
    }
    
    if (type === 'elder') {
      // Staff
      for (let i = 0; i < 10; i++) {
        ctx.fillStyle = i < 1 ? '#88f' : '#654';
        ctx.fillRect(baseX + 14, baseY + 4 + i * 2, 2, 2);
      }
      // Orb on staff
      ctx.fillStyle = '#88f';
      ctx.fillRect(baseX + 13, baseY + 2, 4, 4);
      ctx.fillStyle = '#aaf';
      ctx.fillRect(baseX + 14, baseY + 3, 2, 2);
    }
    
    // Quest marker
    ctx.fillStyle = '#f1c40f';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('!', cx, baseY - 2);
  }
};
